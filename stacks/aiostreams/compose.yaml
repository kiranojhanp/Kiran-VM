services:
  aiostreams:
    image: ghcr.io/viren070/aiostreams:${AIOSTREAMS_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - aiostreams_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.aiostreams.rule=Host(`${AIOSTREAMS_HOST:-aiostreams.fewa.app}`)
      - traefik.http.routers.aiostreams.entrypoints=websecure
      - traefik.http.routers.aiostreams.tls=true
      - traefik.http.routers.aiostreams.tls.certresolver=cloudflare

  jackett:
    image: linuxserver/jackett:${JACKETT_TAG:-latest}
    restart: unless-stopped
    ports:
      - "9117:9117"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - jackett_data:/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.jackett.rule=Host(`${JACKETT_HOST:-jackett.fewa.app}`)
      - traefik.http.routers.jackett.entrypoints=websecure
      - traefik.http.routers.jackett.tls=true
      - traefik.http.routers.jackett.tls.certresolver=cloudflare

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  aiostreams_data:
  jackett_data: