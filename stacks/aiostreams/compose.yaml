services:
  aiostreams:
    image: ghcr.io/viren070/aiostreams:${AIOSTREAMS_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - BASE_URL=https://${AIOSTREAMS_HOST:-aiostreams.fewa.app}
      - ADDON_PROXY=http://warp:1080
    volumes:
      - aio-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.aiostreams.rule=Host(`${AIOSTREAMS_HOST:-aiostreams.fewa.app}`)
      - traefik.http.routers.aiostreams.entrypoints=websecure
      - traefik.http.routers.aiostreams.tls=true
      - traefik.http.routers.aiostreams.tls.certresolver=cloudflare

  jackett:
    image: linuxserver/jackett:${JACKETT_TAG:-latest}
    restart: unless-stopped
    ports:
      - "9117:9117"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - jackett_data:/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.jackett.rule=Host(`${JACKETT_HOST:-jackett.fewa.app}`)
      - traefik.http.routers.jackett.entrypoints=websecure
      - traefik.http.routers.jackett.tls=true
      - traefik.http.routers.jackett.tls.certresolver=cloudflare

  aiometadata:
    image: ghcr.io/cedya77/aiometadata:${AIOMETADATA_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOST_NAME=https://${AIOMETADATA_HOST:-aiometadata.fewa.app}
      - PORT=3232
      - DATABASE_URI=sqlite://addon/data/db.sqlite
      - REDIS_URL=${REDIS_HOST_SHARED}
    volumes:
      - aiometadata_data:/app/addon/data
    networks:
      - shared
      - infra
    labels:
      - traefik.enable=true
      - traefik.http.routers.aiometadata.rule=Host(`${AIOMETADATA_HOST:-aiometadata.fewa.app}`)
      - traefik.http.routers.aiometadata.entrypoints=websecure
      - traefik.http.routers.aiometadata.tls=true
      - traefik.http.routers.aiometadata.tls.certresolver=cloudflare
      - traefik.http.services.aiometadata.loadbalancer.server.port=3232
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3232/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  warp:
    image: caomingjun/warp:${WARP_TAG:-latest}
    restart: unless-stopped
    expose:
      - "1080"
    environment:
      - WARP_SLEEP=2
    cap_add:
      - NET_ADMIN
    device_cgroup_rules:
      - 'c 10:200 rwm'
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - warp-data:/var/lib/cloudflare-warp
    networks:
      - shared
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mediaflow-proxy:
    image: mhdzumair/mediaflow-proxy:${MEDIAFLOW_TAG:-latest}
    restart: unless-stopped
    expose:
      - "8888"
    environment:
      - API_PASSWORD=${MEDIAFLOW_PASSWORD:-}
      - PROXY_URL=http://warp:1080
      - TRANSPORT_ROUTES={"https://torrentio.strem.fun":{"proxy":true}}
    volumes:
      - mediaflow_data:/app/data
    networks:
      - shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.mediaflow.rule=Host(`${MEDIAFLOW_HOST:-mediaflow.fewa.app}`)
      - traefik.http.routers.mediaflow.entrypoints=websecure
      - traefik.http.routers.mediaflow.tls=true
      - traefik.http.routers.mediaflow.tls.certresolver=cloudflare
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true
  infra:
    name: ${SHARED_INFRA_NETWORK:-infra_net}
    external: true

volumes:
  aio-data:
  jackett_data:
  aiometadata_data:
  warp-data:
  mediaflow_data: