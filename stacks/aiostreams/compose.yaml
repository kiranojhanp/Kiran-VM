services:
  aiostreams:
    image: ghcr.io/viren070/aiostreams:${AIOSTREAMS_TAG:-latest}
    container_name: aiostreams
    restart: unless-stopped
    environment:
      - AIOSTREAMS_PORT=3000
      - BASE_URL=${AIOSTREAMS_BASE_URL:-https://aiostreams.fewa.app}
      - SECRET_KEY=${AIOSTREAMS_SECRET_KEY:-}
      - TORBOX_API_KEY=${TORBOX_API_KEY:-}
      - AIOSTREAMS_BUILTIN_ADDONS=${AIOSTREAMS_BUILTIN_ADDONS:-true}
    env_file:
      - path: ./.env
        required: false
    volumes:
      - aiostreams_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.aiostreams.rule: Host(`${AIOSTREAMS_HOST:-aiostreams.fewa.app}`)
      traefik.http.routers.aiostreams.entrypoints: websecure
      traefik.http.routers.aiostreams.tls: "true"
      traefik.http.routers.aiostreams.tls.certresolver: cloudflare
      traefik.http.services.aiostreams.loadbalancer.server.port: "3000"

  jackett:
    image: linuxserver/jackett:${JACKETT_TAG:-latest}
    container_name: jackett
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - jackett_data:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9117/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.jackett.rule: Host(`${JACKETT_HOST:-jackett.fewa.app}`)
      traefik.http.routers.jackett.entrypoints: websecure
      traefik.http.routers.jackett.tls: "true"
      traefik.http.routers.jackett.tls.certresolver: cloudflare
      traefik.http.services.jackett.loadbalancer.server.port: "9117"

  

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  aiostreams_data:
  jackett_data: