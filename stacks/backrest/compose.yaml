services:
  backrest:
    image: ghcr.io/garethgeorge/backrest:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      BACKREST_DATA: /data
      BACKREST_CONFIG: /config/config.json
      XDG_CACHE_HOME: /cache
      TMPDIR: /tmp
    volumes:
      - backrest_data:/data
      - backrest_config:/config
      - backrest_cache:/cache
      - backrest_tmp:/tmp
      - /opt/backup:/opt/backup
      - /var/backups/postgres/shared:/var/backups/postgres/shared
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.backrest.rule: Host(`${BACKREST_HOST:-backrest.fewa.app}`)
      traefik.http.routers.backrest.entrypoints: websecure
      traefik.http.routers.backrest.tls: "true"
      traefik.http.routers.backrest.tls.certresolver: letsencrypt
      traefik.http.services.backrest.loadbalancer.server.port: "9898"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  backrest_data:
  backrest_config:
  backrest_cache:
  backrest_tmp:
