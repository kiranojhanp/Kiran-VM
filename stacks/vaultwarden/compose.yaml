services:
  vaultwarden:
    image: docker.io/vaultwarden/server:1.35.4
    restart: unless-stopped
      - no-new-privileges:true
# apparmor:docker-default

      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    memswap_limit: 512m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 100
    environment:
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: ${VAULTWARDEN_SIGNUPS_ALLOWED:-false}
      DOMAIN: https://${VAULTWARDEN_HOST:-vaultwarden.fewa.app}
      URL: https://${VAULTWARDEN_HOST:-vaultwarden.fewa.app}
    volumes:
      - vaultwarden_data:/data
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.vaultwarden.rule: Host(`${VAULTWARDEN_HOST:-vaultwarden.fewa.app}`)
      traefik.http.routers.vaultwarden.entrypoints: websecure
      traefik.http.routers.vaultwarden.tls: "true"
      traefik.http.routers.vaultwarden.tls.certresolver: letsencrypt
      traefik.http.services.vaultwarden.loadbalancer.server.port: "80"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  vaultwarden_data:
