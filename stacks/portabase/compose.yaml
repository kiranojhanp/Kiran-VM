services:
  portabase:
    image: portabase/portabase:latest
    restart: unless-stopped
    environment:
      TZ: ${PORTABASE_TZ:-UTC}
      PROJECT_URL: ${PORTABASE_PROJECT_URL:-https://${PORTABASE_HOST:-portabase.fewa.app}}
      PROJECT_SECRET: ${PORTABASE_PROJECT_SECRET:-change-me-please-generate-a-secure-hex-token}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${PORTABASE_POSTGRES_DB:-portabase}
      POSTGRES_USER: ${PORTABASE_POSTGRES_USER:-portabase}
      POSTGRES_PASSWORD: ${PORTABASE_POSTGRES_PASSWORD:-change-me}
      DATABASE_URL: postgresql://${PORTABASE_POSTGRES_USER:-portabase}:${PORTABASE_POSTGRES_PASSWORD:-change-me}@db:5432/${PORTABASE_POSTGRES_DB:-portabase}?schema=public
    volumes:
      - portabase_data:/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shared
      - internal
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.portabase.rule: Host(`${PORTABASE_HOST:-portabase.fewa.app}`)
      traefik.http.routers.portabase.entrypoints: websecure
      traefik.http.routers.portabase.tls: "true"
      traefik.http.routers.portabase.tls.certresolver: letsencrypt
      traefik.http.services.portabase.loadbalancer.server.port: "80"

  agent:
    image: portabase/agent:latest
    restart: unless-stopped
    environment:
      TZ: ${PORTABASE_AGENT_TZ:-UTC}
      POLLING: ${PORTABASE_AGENT_POLLING:-5}
      APP_ENV: production
      DATA_PATH: /data
      DATABASES_CONFIG_FILE: /config/config.json
      LOG: ${PORTABASE_AGENT_LOG:-info}
      EDGE_KEY: ${PORTABASE_AGENT_EDGE_KEY:-}
    volumes:
      - ./agent/databases.json:/config/config.json
      - portabase_agent_data:/data
    depends_on:
      portabase:
        condition: service_started
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - internal
      - infra

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PORTABASE_POSTGRES_DB:-portabase}
      POSTGRES_USER: ${PORTABASE_POSTGRES_USER:-portabase}
      POSTGRES_PASSWORD: ${PORTABASE_POSTGRES_PASSWORD:-change-me}
    volumes:
      - portabase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PORTABASE_POSTGRES_USER:-portabase} -d ${PORTABASE_POSTGRES_DB:-portabase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true
  infra:
    name: ${SHARED_INFRA_NETWORK:-infra_net}
    external: true
  internal:

volumes:
  portabase_data:
  portabase_postgres_data:
  portabase_agent_data:
