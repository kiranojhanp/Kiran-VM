services:
  garage:
    image: dxflrs/garage:v2.1.0
    container_name: garage
    restart: unless-stopped
    volumes:
      - /opt/garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    networks:
      - shared

  garage-webui:
    image: khairul169/garage-webui:1.1.0
    restart: unless-stopped
    volumes:
      - /opt/garage/garage.toml:/etc/garage.toml:ro
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"
    depends_on:
      garage:
        condition: service_started
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.garage-webui.rule: Host(`${GARAGE_HOST:-garage.fewa.app}`)
      traefik.http.routers.garage-webui.entrypoints: websecure
      traefik.http.routers.garage-webui.tls: "true"
      traefik.http.routers.garage-webui.tls.certresolver: letsencrypt
      traefik.http.services.garage-webui.loadbalancer.server.port: "3909"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  garage_meta:
  garage_data:
