services:
  garage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garage
    restart: unless-stopped
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN}
      - GARAGE_METRICS_TOKEN=${GARAGE_METRICS_TOKEN}
      - GARAGE_S3_REGION=${GARAGE_S3_REGION:-us-east-1}
      - GARAGE_DOMAIN=${GARAGE_DOMAIN:-localhost}
    volumes:
      - ./garage.toml.tmpl:/etc/garage.toml.template:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3901/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  garage-webui:
    image: khairul169/garage-webui:1.1.0
    restart: unless-stopped
    volumes:
      - ./garage.toml.tmpl:/etc/garage.toml.template:ro
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"
    depends_on:
      garage:
        condition: service_healthy
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.garage-webui.rule: Host(`${GARAGE_HOST:-garage.fewa.app}`)
      traefik.http.routers.garage-webui.entrypoints: websecure
      traefik.http.routers.garage-webui.tls: "true"
      traefik.http.routers.garage-webui.tls.certresolver: letsencrypt
      traefik.http.services.garage-webui.loadbalancer.server.port: "3909"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  garage_meta:
  garage_data:
