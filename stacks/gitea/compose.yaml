# Gitea (rootless) — self-hosted git forge
# Managed by Komodo (git-backed) — edit this file and push to redeploy.
#
# Stack Environment vars expected (set in Komodo Stack Config):
#   Non-secret:
#     GITEA__database__DB_TYPE=postgres
#     GITEA__database__HOST=postgres:5432
#     GITEA__database__NAME=gitea
#     GITEA__database__USER=gitea_user
#     GITEA__database__SSL_MODE=disable
#     GITEA__server__DOMAIN=git.fewa.app
#     GITEA__server__ROOT_URL=https://git.fewa.app
#     GITEA__server__HTTP_PORT=3000
#     GITEA__server__SSH_DOMAIN=git.fewa.app
#     GITEA__server__SSH_PORT=2223
#     GITEA__server__SSH_LISTEN_PORT=2222
#     GITEA__server__DISABLE_SSH=false
#     GITEA__server__ENABLE_PPROF=false
#     GITEA__service__DISABLE_REGISTRATION=false
#     GITEA__service__REQUIRE_SIGNIN_VIEW=false
#     GITEA__ui__DEFAULT_THEME=gitea-dark
#     GITEA__ui__THEMES=gitea-light,gitea-dark,gitea-auto
#     GITEA__log__LEVEL=info
#     GITEA__webhook__ALLOWED_HOST_LIST=komodo.fewa.app
#   Secret (Komodo Variables → [[VAR_NAME]]):
#     GITEA__database__PASSWD=[[GITEA_DB_PASSWORD]]
#     GITEA__security__SECRET_KEY=[[GITEA_SECRET_KEY]]
#
# Note: data/ and config/ dirs must be owned by 1000:1000 (rootless image).
# Ansible still manages /opt/gitea/data/custom/templates/ (home.tmpl, header.tmpl).

networks:
  infra_net:
    external: true

services:
  gitea:
    image: docker.gitea.com/gitea:latest-rootless
    restart: unless-stopped
    # Rootless image runs as uid 1000 — data dirs must be owned by 1000:1000.
    user: "1000:1000"
    environment:
      GITEA__database__DB_TYPE: ${GITEA__database__DB_TYPE}
      GITEA__database__HOST: ${GITEA__database__HOST}
      GITEA__database__NAME: ${GITEA__database__NAME}
      GITEA__database__USER: ${GITEA__database__USER}
      GITEA__database__PASSWD: ${GITEA__database__PASSWD}
      GITEA__database__SSL_MODE: ${GITEA__database__SSL_MODE}
      GITEA__server__DOMAIN: ${GITEA__server__DOMAIN}
      GITEA__server__ROOT_URL: ${GITEA__server__ROOT_URL}
      GITEA__server__HTTP_PORT: ${GITEA__server__HTTP_PORT}
      GITEA__server__SSH_DOMAIN: ${GITEA__server__SSH_DOMAIN}
      GITEA__server__SSH_PORT: ${GITEA__server__SSH_PORT}
      GITEA__server__SSH_LISTEN_PORT: ${GITEA__server__SSH_LISTEN_PORT}
      GITEA__server__DISABLE_SSH: ${GITEA__server__DISABLE_SSH}
      GITEA__server__ENABLE_PPROF: ${GITEA__server__ENABLE_PPROF}
      GITEA__security__SECRET_KEY: ${GITEA__security__SECRET_KEY}
      GITEA__service__DISABLE_REGISTRATION: ${GITEA__service__DISABLE_REGISTRATION}
      GITEA__service__REQUIRE_SIGNIN_VIEW: ${GITEA__service__REQUIRE_SIGNIN_VIEW}
      GITEA__ui__DEFAULT_THEME: ${GITEA__ui__DEFAULT_THEME}
      GITEA__ui__THEMES: ${GITEA__ui__THEMES}
      GITEA__log__LEVEL: ${GITEA__log__LEVEL}
      GITEA__webhook__ALLOWED_HOST_LIST: ${GITEA__webhook__ALLOWED_HOST_LIST}
    ports:
      - "127.0.0.1:3001:3000"
      - "0.0.0.0:2223:2222"
    volumes:
      - /opt/gitea/data:/var/lib/gitea
      - /opt/gitea/config:/etc/gitea
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - infra_net
    mem_limit: 768m
