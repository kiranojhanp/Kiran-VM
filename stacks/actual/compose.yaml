services:
  actual-server:
    image: docker.io/actualbudget/actual-server:latest
    restart: unless-stopped
    environment:
      ACTUAL_PORT: "5006"
    volumes:
      - actual_data:/data
    healthcheck:
      test: ["CMD-SHELL", "node src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.actual.rule: Host(`${ACTUAL_HOST:-actual.fewa.app}`)
      traefik.http.routers.actual.entrypoints: websecure
      traefik.http.routers.actual.tls: "true"
      traefik.http.routers.actual.tls.certresolver: letsencrypt
      traefik.http.routers.actual.middlewares: actual-security-headers,compress
      traefik.http.middlewares.actual-security-headers.headers.customFrameOptionsValue: SAMEORIGIN
      traefik.http.middlewares.actual-security-headers.headers.contentTypeNosniff: "true"
      traefik.http.middlewares.actual-security-headers.headers.referrerPolicy: strict-origin-when-cross-origin
      traefik.http.middlewares.actual-security-headers.headers.stsSeconds: "31536000"
      traefik.http.middlewares.actual-security-headers.headers.stsIncludeSubdomains: "true"
      traefik.http.middlewares.actual-security-headers.headers.stsPreload: "true"
      traefik.http.middlewares.actual-security-headers.headers.customResponseHeaders.Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"
      traefik.http.middlewares.compress.compress: "true"
      traefik.http.services.actual.loadbalancer.server.port: "5006"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  actual_data:
