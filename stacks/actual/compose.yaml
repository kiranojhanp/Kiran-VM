services:
  actual-server:
    image: docker.io/actualbudget/actual-server:latest
    restart: unless-stopped
      - no-new-privileges:true
# apparmor:docker-default

      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 100
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 100
    environment:
      ACTUAL_PORT: "5006"
      # OpenID / authentik SSO
      ACTUAL_OPENID_DISCOVERY_URL: ${ACTUAL_OPENID_DISCOVERY_URL:-}
      ACTUAL_OPENID_CLIENT_ID: ${ACTUAL_OPENID_CLIENT_ID:-}
      ACTUAL_OPENID_CLIENT_SECRET: ${ACTUAL_OPENID_CLIENT_SECRET:-}
      ACTUAL_OPENID_SERVER_HOSTNAME: https://${ACTUAL_HOST:-actual.fewa.app}
    volumes:
      - actual_data:/data
    healthcheck:
      test: ["CMD-SHELL", "node src/scripts/health-check.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.actual.rule: Host(`${ACTUAL_HOST:-actual.fewa.app}`)
      traefik.http.routers.actual.entrypoints: websecure
      traefik.http.routers.actual.tls: "true"
      traefik.http.routers.actual.tls.certresolver: letsencrypt
      traefik.http.services.actual.loadbalancer.server.port: "5006"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  actual_data:
