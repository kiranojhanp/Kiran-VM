services:
  mealie:
    image: hkotel/mealie:latest
    restart: unless-stopped
      - no-new-privileges:true
# apparmor:docker-default - too restrictive
    mem_limit: 1g
    memswap_limit: 1g
    pids_limit: 100
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 100
    environment:
      ALLOW_SIGNUP: "${MEALIE_ALLOW_SIGNUP:-true}"
      TZ: ${TZ:-UTC}
      MAX_WORKERS: ${MEALIE_MAX_WORKERS:-1}
      WEB_CONCURRENCY: ${MEALIE_WEB_CONCURRENCY:-1}
      BASE_URL: https://${MEALIE_HOST:-mealie.fewa.app}
      DB_ENGINE: postgres
      POSTGRES_SERVER: ${SHARED_POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${SHARED_POSTGRES_PORT:-5432}
      POSTGRES_DB: ${MEALIE_DB_NAME:-mealie}
      POSTGRES_USER: ${MEALIE_DB_USER:-mealie}
      POSTGRES_PASSWORD: ${MEALIE_DB_PASSWORD:-mealie}
      OIDC_AUTH_ENABLED: ${OIDC_AUTH_ENABLED:-true}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-authentik}
      OIDC_CONFIGURATION_URL: ${OIDC_CONFIGURATION_URL:-https://authentik.fewa.app/application/o/mealie/.well-known/openid-configuration}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SIGNUP_ENABLED: ${OIDC_SIGNUP_ENABLED:-true}
      OIDC_USER_GROUP: ${OIDC_USER_GROUP:-mealie-users}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP:-mealie-admins}
      OIDC_GROUPS_CLAIM: ${OIDC_GROUPS_CLAIM:-groups}
      OIDC_SIGNING_ALGORITHM: ${OIDC_SIGNING_ALGORITHM:-RS256}
      OIDC_AUTO_REDIRECT: ${OIDC_AUTO_REDIRECT:-true}
      OIDC_REMEMBER_ME: ${OIDC_REMEMBER_ME:-true}
    volumes:
      - mealie_data:/app/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - shared
      - infra
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.mealie.rule: Host(`${MEALIE_HOST:-mealie.fewa.app}`)
      traefik.http.routers.mealie.entrypoints: websecure
      traefik.http.routers.mealie.tls: "true"
      traefik.http.routers.mealie.tls.certresolver: letsencrypt
      traefik.http.services.mealie.loadbalancer.server.port: "9000"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true
  infra:
    name: ${SHARED_INFRA_NETWORK:-infra_net}
    external: true

volumes:
  mealie_data:
