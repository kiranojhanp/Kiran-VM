services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
      - no-new-privileges:true
# apparmor:docker-default

      - ALL
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 100
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 100
    volumes:
      - uptime-kuma_data:/app/data
    healthcheck:
      test: ["CMD", "node", "/app/extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.uptime-kuma.rule: Host(`${UPTIME_KUMA_HOST:-uptime.fewa.app}`)
      traefik.http.routers.uptime-kuma.entrypoints: websecure
      traefik.http.routers.uptime-kuma.tls: "true"
      traefik.http.routers.uptime-kuma.tls.certresolver: letsencrypt
      traefik.http.services.uptime-kuma.loadbalancer.server.port: "3001"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  uptime-kuma_data: