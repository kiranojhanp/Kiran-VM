services:
  uptime-kuma:
    image: louislam/uptime-kuma:2
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    mem_limit: 512m
    memswap_limit: 512m
    pids_limit: 100
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "node", "/app/extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 512m

volumes:
      - uptime-kuma_data:/app/data
    networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  uptime-kuma_data:
