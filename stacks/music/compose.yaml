services:
  navidrome:
    image: deluan/navidrome:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      ND_PUBLISHURL: https://${NAVIDROME_HOST:-navidrome.fewa.app}
    volumes:
      - navidrome_config:/config
      - slskd_downloads:/music
      - /etc/localtime:/etc/localtime:ro
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.navidrome.rule: Host(`${NAVIDROME_HOST:-navidrome.fewa.app}`)
      traefik.http.routers.navidrome.entrypoints: websecure
      traefik.http.routers.navidrome.tls: "true"
      traefik.http.routers.navidrome.tls.certresolver: letsencrypt
      traefik.http.services.navidrome.loadbalancer.server.port: "4533"

  lidarr:
    image: linuxserver/lidarr:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - lidarr_config:/config
      - slskd_downloads:/music
      - /etc/localtime:/etc/localtime:ro
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.lidarr.rule: Host(`${LIDARR_HOST:-lidarr.fewa.app}`)
      traefik.http.routers.lidarr.entrypoints: websecure
      traefik.http.routers.lidarr.tls: "true"
      traefik.http.routers.lidarr.tls.certresolver: letsencrypt
      traefik.http.services.lidarr.loadbalancer.server.port: "8686"

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - prowlarr_config:/config
      - /etc/localtime:/etc/localtime:ro
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.prowlarr.rule: Host(`${PROWLARR_HOST:-prowlarr.fewa.app}`)
      traefik.http.routers.prowlarr.entrypoints: websecure
      traefik.http.routers.prowlarr.tls: "true"
      traefik.http.routers.prowlarr.tls.certresolver: letsencrypt
      traefik.http.services.prowlarr.loadbalancer.server.port: "9696"

  feishin:
    image: ghcr.io/jeffvli/feishin:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.feishin.rule: Host(`${FEISHIN_HOST:-music.fewa.app}`)
      traefik.http.routers.feishin.entrypoints: websecure
      traefik.http.routers.feishin.tls: "true"
      traefik.http.routers.feishin.tls.certresolver: letsencrypt
      traefik.http.services.feishin.loadbalancer.server.port: "9180"

  slskd:
    image: slskd/slskd
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      SLSKD_REMOTE_CONFIGURATION: "true"
      SLSKD_DIRECTORIES_DOWNLOADS: /app/downloads
    volumes:
      - slskd_config:/app
      - slskd_downloads:/app/downloads
      - /opt/music:/data:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.slskd.rule: Host(`${SLSKD_HOST:-slskd.fewa.app}`)
      traefik.http.routers.slskd.entrypoints: websecure
      traefik.http.routers.slskd.tls: "true"
      traefik.http.routers.slskd.tls.certresolver: letsencrypt
      traefik.http.services.slskd.loadbalancer.server.port: "5030"

  soularr:
    image: mrusse08/soularr:latest
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      SCRIPT_INTERVAL: "300"
      SLSKD_URL: "http://slskd:5030"
      LIDARR_API_KEY: ${LIDARR_API_KEY:-}
      SLSKD_API_KEY: ${SLSKD_API_KEY:-}
    volumes:
      - soularr_config:/data
      - /opt/music:/data/slskd_downloads:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.soularr.rule: Host(`${SOULARR_HOST:-soularr.fewa.app}`)
      traefik.http.routers.soularr.entrypoints: websecure
      traefik.http.routers.soularr.tls: "true"
      traefik.http.routers.soularr.tls.certresolver: letsencrypt
      traefik.http.services.soularr.loadbalancer.server.port: "5055"
    command: >
      /bin/sh -c "
        if [ -n \"$$LIDARR_API_KEY\" ] && [ -n \"$$SLSKD_API_KEY\" ]; then
          echo '[Lidarr]' > /data/config.ini;
          echo \"api_key = $$LIDARR_API_KEY\" >> /data/config.ini;
          echo 'host_url = http://lidarr:8686' >> /data/config.ini;
          echo 'download_dir = /data/slskd_downloads' >> /data/config.ini;
          echo 'disable_sync = False' >> /data/config.ini;
          echo '' >> /data/config.ini;
          echo '[Slskd]' >> /data/config.ini;
          echo \"api_key = $$SLSKD_API_KEY\" >> /data/config.ini;
          echo 'host_url = http://slskd:5030' >> /data/config.ini;
          echo 'url_base = /' >> /data/config.ini;
          echo 'download_dir = /downloads' >> /data/config.ini;
          echo 'delete_searches = True' >> /data/config.ini;
          echo 'stalled_timeout = 1800' >> /data/config.ini;
          echo '' >> /data/config.ini;
          echo '[Release Settings]' >> /data/config.ini;
          echo 'use_most_common_tracknum = True' >> /data/config.ini;
          echo 'allow_multi_disc = False' >> /data/config.ini;
          echo 'accepted_countries = United States,United Kingdom,[Worldwide]' >> /data/config.ini;
          echo 'skip_region_check = False' >> /data/config.ini;
          echo 'accepted_formats = FLAC' >> /data/config.ini;
          echo '' >> /data/config.ini;
          echo '[Search Settings]' >> /data/config.ini;
          echo 'search_timeout = 3000' >> /data/config.ini;
          echo 'maximum_peer_queue = 30' >> /data/config.ini;
          echo 'minimum_peer_upload_speed = 0' >> /data/config.ini;
          echo 'minimum_filename_match_ratio = 0.85' >> /data/config.ini;
          echo 'allowed_filetypes = flac' >> /data/config.ini;
          echo 'track_prepend_artist = False' >> /data/config.ini;
          echo 'search_type = first_page' >> /data/config.ini;
          echo 'number_of_albums_to_grab = 1' >> /data/config.ini;
          echo 'remove_wanted_on_failure = True' >> /data/config.ini;
          echo '' >> /data/config.ini;
          echo '[Download Settings]' >> /data/config.ini;
          echo 'download_filtering = True' >> /data/config.ini;
          echo 'use_extension_whitelist = True' >> /data/config.ini;
          echo 'extensions_whitelist = flac' >> /data/config.ini;
          echo '' >> /data/config.ini;
          echo '[Logging]' >> /data/config.ini;
          echo 'level = INFO' >> /data/config.ini;
        fi;
        exec python /app/soularr.py
      "

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  navidrome_config:
  lidarr_config:
  prowlarr_config:
  slskd_config:
  slskd_downloads:
  soularr_config: