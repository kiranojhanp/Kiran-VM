# Sure — self-hosted relationship tracker
# Managed by Komodo (git-backed) — edit this file and push to redeploy.
#
# Stack Environment vars expected (set in Komodo Stack Config):
#   Non-secret:
#     POSTGRES_USER=sure_user
#     POSTGRES_DB=sure_production
#     DB_HOST=postgres
#     DB_PORT=5432
#     SELF_HOSTED=true
#     RAILS_FORCE_SSL=false
#     RAILS_ASSUME_SSL=true
#     REDIS_URL=redis://redis:6379/2
#   Secret (Komodo Variables → [[VAR_NAME]]):
#     POSTGRES_PASSWORD=[[SURE_DB_PASSWORD]]
#     SECRET_KEY_BASE=[[SURE_SECRET_KEY_BASE]]
#     OPENAI_ACCESS_TOKEN=[[OPENAI_ACCESS_TOKEN]]

x-rails-env: &rails_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  SELF_HOSTED: "true"
  RAILS_FORCE_SSL: "false"
  RAILS_ASSUME_SSL: "true"
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  REDIS_URL: ${REDIS_URL}
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}

services:
  web:
    image: ghcr.io/we-promise/sure:stable
    volumes:
      - app-storage:/rails/storage
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    environment:
      <<: *rails_env
    networks:
      - infra_net

  worker:
    image: ghcr.io/we-promise/sure:stable
    command: bundle exec sidekiq
    volumes:
      - app-storage:/rails/storage
    restart: unless-stopped
    environment:
      <<: *rails_env
    networks:
      - infra_net

volumes:
  app-storage:

networks:
  infra_net:
    external: true
