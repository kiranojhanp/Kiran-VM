services:
  decypharr:
    image: cy01/blackhole:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8282:8282"
    volumes:
      - /mnt/:/mnt:rshared
      - ./decypharr-config.json:/app/config.json
      - decypharr_cache:/cache
    devices:
      - /dev/fuse:/dev/fuse:rwm
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    networks:
      - shared
      - infra
    labels:
      - traefik.enable=true
      - traefik.http.routers.decypharr.rule=Host(`${DECYPHARR_HOST:-decypharr.fewa.app}`)
      - traefik.http.routers.decypharr.entrypoints=websecure
      - traefik.http.routers.decypharr.tls=true
      - traefik.http.routers.decypharr.tls.certresolver=cloudflare
      - traefik.http.services.decypharr.loadbalancer.server.port=8282
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8282/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    ports:
      - "32400:32400"
    volumes:
      - plex_config:/config
      - /mnt/decypharr/tv:/tv:ro
      - /mnt/decypharr/movies:/movies:ro
    networks:
      - shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.plex.rule=Host(`${PLEX_HOST:-plex.fewa.app}`)
      - traefik.http.routers.plex.entrypoints=websecure
      - traefik.http.routers.plex.tls=true
      - traefik.http.routers.plex.tls.certresolver=cloudflare
      - traefik.http.services.plex.loadbalancer.server.port=32400
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:32400/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - sonarr_config:/config
      - /mnt/decypharr/tv:/tv
      - /mnt/decypharr/downloads:/downloads
    networks:
      - shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`${SONARR_HOST:-sonarr.fewa.app}`)
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.tls=true
      - traefik.http.routers.sonarr.tls.certresolver=cloudflare
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - radarr_config:/config
      - /mnt/decypharr/movies:/movies
      - /mnt/decypharr/downloads:/downloads
    networks:
      - shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`${RADARR_HOST:-radarr.fewa.app}`)
      - traefik.http.routers.radarr.entrypoints=websecure
      - traefik.http.routers.radarr.tls=true
      - traefik.http.routers.radarr.tls.certresolver=cloudflare
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true
  infra:
    name: ${SHARED_INFRA_NETWORK:-infra_net}
    external: true

volumes:
  decypharr_cache:
    name: decypharr_cache
    external: true
  plex_config:
    name: plex_config
  sonarr_config:
    name: sonarr_config
  radarr_config:
    name: radarr_config
