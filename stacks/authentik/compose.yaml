services:
  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.2}
    command: server
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-change-me}
      AUTHENTIK_POSTGRESQL__HOST: ${SHARED_POSTGRES_HOST:-postgres}
      AUTHENTIK_POSTGRESQL__PORT: ${SHARED_POSTGRES_PORT:-5432}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_DISABLE_UPDATE_CHECK: ${AUTHENTIK_DISABLE_UPDATE_CHECK:-false}
      AUTHENTIK_OUTPOSTS__DISCOVER: ${AUTHENTIK_OUTPOSTS__DISCOVER:-false}
    volumes:
      - authentik_data:/data
    networks:
      - shared
      - infra
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.authentik.rule: Host(`${AUTHENTIK_HOST:-auth.fewa.app}`)
      traefik.http.routers.authentik.entrypoints: websecure
      traefik.http.routers.authentik.tls: "true"
      traefik.http.routers.authentik.tls.certresolver: letsencrypt
      traefik.http.services.authentik.loadbalancer.server.port: "9000"

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.2}
    command: worker
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-change-me}
      AUTHENTIK_POSTGRESQL__HOST: ${SHARED_POSTGRES_HOST:-postgres}
      AUTHENTIK_POSTGRESQL__PORT: ${SHARED_POSTGRES_PORT:-5432}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_DISABLE_UPDATE_CHECK: ${AUTHENTIK_DISABLE_UPDATE_CHECK:-false}
      AUTHENTIK_OUTPOSTS__DISCOVER: ${AUTHENTIK_OUTPOSTS__DISCOVER:-false}
    volumes:
      - authentik_data:/data
    networks:
      - shared
      - infra

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true
  infra:
    name: ${SHARED_INFRA_NETWORK:-infra_net}
    external: true

volumes:
  authentik_data:
