services:
  vaultwarden-backup:
    image: ttionya/vaultwarden-backup:latest
    restart: unless-stopped
    environment:
      RCLONE_CONFIG: /config/rclone.conf
      RCLONE_REMOTE_NAME: ${VW_BACKUP_RCLONE_REMOTE_NAME:-garage}
      RCLONE_REMOTE_DIR: ${VW_BACKUP_RCLONE_REMOTE_DIR:-vaultwarden-backups/prod/}
      CRON: ${VW_BACKUP_CRON:-17 3 * * *}
      ZIP_ENABLE: ${VW_BACKUP_ZIP_ENABLE:-TRUE}
      ZIP_TYPE: ${VW_BACKUP_ZIP_TYPE:-7z}
      BACKUP_FILE_SUFFIX: ${VW_BACKUP_FILE_SUFFIX:-%Y%m%d-%H%M%S}
      BACKUP_KEEP_DAYS: ${VW_BACKUP_KEEP_DAYS:-30}
      PING_URL: ${VW_BACKUP_PING_URL:-}
      TIMEZONE: ${TZ:-UTC}
      ZIP_PASSWORD: ${VW_BACKUP_ZIP_PASSWORD:-}
    volumes:
      - vaultwarden_data:/bitwarden/data:ro
      - vaultwarden_backup_rclone_data:/config

volumes:
  vaultwarden_data:
    external: true
    name: ${VAULTWARDEN_DATA_VOLUME:-vaultwarden_vaultwarden_data}
  vaultwarden_backup_rclone_data:
