services:
  wealthfolio:
    image: ghcr.io/afadil/wealthfolio:latest
    restart: unless-stopped
    environment:
      WF_DB_PATH: ${WF_DB_PATH:-/data/wealthfolio.db}
      WF_CORS_ALLOW_ORIGINS: ${WF_CORS_ALLOW_ORIGINS:-https://wealthfolio.fewa.app}
      WF_SECRET_KEY: ${WF_SECRET_KEY:-}
      WF_AUTH_PASSWORD_HASH: ${WF_AUTH_PASSWORD_HASH:-}
    volumes:
      - wealthfolio_data:/data
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.wealthfolio.rule: Host(`${WEALTHFOLIO_HOST:-wealthfolio.fewa.app}`)
      traefik.http.routers.wealthfolio.entrypoints: websecure
      traefik.http.routers.wealthfolio.tls: "true"
      traefik.http.routers.wealthfolio.tls.certresolver: letsencrypt
      traefik.http.services.wealthfolio.loadbalancer.server.port: "8088"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  wealthfolio_data:
