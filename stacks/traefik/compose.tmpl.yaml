## Traefik -- reverse proxy + TLS (Cloudflare DNS challenge)
## Managed by Komodo (git-backed) -- edit Taskfile defaults and push to redeploy.
##
## Generated by stacks/traefik/render.py from Taskfile.yml variables.
##
## Stack Environment vars expected (set in Komodo Stack Config):
##   Secret (Komodo Variables -> [[VAR_NAME]]):
##     CLOUDFLARE_API_TOKEN=[[CLOUDFLARE_API_TOKEN]]
##   Non-secret:
##     SHARED_DOCKER_NETWORK=__SHARED_NETWORK__

services:
  traefik:
    image: traefik:v3.6.10
    command:
      - --configFile=/etc/traefik/traefik.yml
    restart: unless-stopped
    init: true
    environment:
      CLOUDFLARE_DNS_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CF_DNS_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: traefik_static
        target: /etc/traefik/traefik.yml
      - source: traefik_dynamic
        target: /etc/traefik/dynamic.yml
    volumes:
      - traefik_letsencrypt:/letsencrypt
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shared
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 512m

  fewa-site:
    image: hashicorp/http-echo:1.0.0
    command:
      - -listen
      - :5678
      - -text
      - __SITE_MESSAGE__
    restart: unless-stopped
    init: true
    networks:
      - shared
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 64m

networks:
  shared:
    name: __SHARED_NETWORK__
    external: true

volumes:
  traefik_letsencrypt:

configs:
  traefik_static:
    file: ./config/traefik.yml
  traefik_dynamic:
    file: ./config/dynamic.yml
