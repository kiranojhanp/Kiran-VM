services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    restart: unless-stopped
      - no-new-privileges:true
# apparmor:docker-default

      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    memswap_limit: 512m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc: 100
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - audiobookshelf_config:/config
      - audiobookshelf_metadata:/metadata
      - audiobookshelf_audiobooks:/audiobooks
      - audiobookshelf_podcasts:/podcasts
      - audiobookshelf_books:/books
    networks:
      - shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.audiobookshelf.rule: Host(`${AUDIOBOOKSHELF_HOST:-audiobookshelf.fewa.app}`)
      traefik.http.routers.audiobookshelf.entrypoints: websecure
      traefik.http.routers.audiobookshelf.tls: "true"
      traefik.http.routers.audiobookshelf.tls.certresolver: letsencrypt
      traefik.http.services.audiobookshelf.loadbalancer.server.port: "80"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true

volumes:
  audiobookshelf_config:
  audiobookshelf_metadata:
  audiobookshelf_audiobooks:
  audiobookshelf_podcasts:
  audiobookshelf_books:
