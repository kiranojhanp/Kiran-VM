# Open WebUI — AI chat interface
# Managed by Komodo (git-backed) — edit this file and push to redeploy.
#
# Stack Environment vars expected (set in Komodo Stack Config):
#   Non-secret:
#     OPENWEBUI_SUBDOMAIN=chat.fewa.app
#   Secret (Komodo Variables → [[VAR_NAME]]):
#     DATABASE_PASSWORD=[[SHARED_POSTGRES_OPENWEBUI_PASSWORD]]
#     WEBUI_SECRET_KEY=[[OPENWEBUI_SECRET_KEY]]

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:8080"
    volumes:
      - /opt/openwebui/data:/app/backend/data
    environment:
      DATABASE_URL: "postgresql://openwebui:${DATABASE_PASSWORD}@infra-postgres-1:5432/openwebui"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_OLLAMA_API: "false"
      WEBUI_URL: "https://${OPENWEBUI_SUBDOMAIN}"
    networks:
      - infra_net
    mem_limit: 1g

networks:
  infra_net:
    external: true
