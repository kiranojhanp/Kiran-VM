services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    restart: unless-stopped
    environment:
      ENABLE_OLLAMA_API: "false"
      OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS:-https://api.openai.com/v1}
      OPENAI_API_KEYS: ${OPENAI_API_KEYS:-}
      DATABASE_URL: ${DATABASE_URL:-}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-}
      WEBUI_URL: ${WEBUI_URL:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-}
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - shared
      - infra
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${SHARED_DOCKER_NETWORK:-internal-network}
      traefik.http.routers.openwebui.rule: Host(`${OPENWEBUI_HOST:-openwebui.fewa.app}`)
      traefik.http.routers.openwebui.entrypoints: websecure
      traefik.http.routers.openwebui.tls: "true"
      traefik.http.routers.openwebui.tls.certresolver: letsencrypt
      traefik.http.services.openwebui.loadbalancer.server.port: "8080"

networks:
  shared:
    name: ${SHARED_DOCKER_NETWORK:-internal-network}
    external: true
  infra:
    name: ${INFRA_DOCKER_NETWORK:-infra_net}
    external: true

volumes:
  open_webui_data:
