# Open WebUI — AI chat interface
# Managed by Komodo (git-backed) — edit this file and push to redeploy.
# Secrets are written to the stack .env by Ansible (ansible/roles/openwebui).
#
# Required .env vars (written by Ansible from secrets.yml):
#   DATABASE_URL, WEBUI_SECRET_KEY, WEBUI_URL, ENABLE_OLLAMA_API

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:8080"
    volumes:
      - /opt/openwebui/data:/app/backend/data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      WEBUI_URL: ${WEBUI_URL}
      ENABLE_OLLAMA_API: ${ENABLE_OLLAMA_API}
      CORS_ALLOW_ORIGIN: ${WEBUI_URL}
    networks:
      - infra_net
    mem_limit: 1g

networks:
  infra_net:
    external: true
