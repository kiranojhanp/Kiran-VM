# Open WebUI — AI chat interface
# Managed by Komodo (git-backed) — edit this file and push to redeploy.
# Secrets are written to /opt/openwebui/.env by Ansible (from secrets.yml).

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:8080"
    volumes:
      - /opt/openwebui/data:/app/backend/data
    env_file:
      - /opt/openwebui/.env
    networks:
      - infra_net
    mem_limit: 1g

networks:
  infra_net:
    external: true
