---
- name: Configure lean backups (pg_dump + restic)
  when: backup_enabled | bool
  block:
    - name: Assert required backup secrets are set
      ansible.builtin.assert:
        that:
          - backup_restic_repository | default('') | length > 0
          - backup_restic_password | default('') | length > 0
          - backup_shared_postgres_password | default('') | length > 0
          - backup_shared_postgres_databases | length > 0
        fail_msg: >-
          Backup is enabled but required backup_* secrets/variables are missing.
          Fill provision/secrets.yml and provision/group_vars/all.yml.

    - name: Install backup packages
      ansible.builtin.apt:
        name:
          - restic
          - rclone
        state: present
        update_cache: true

    - name: Create backup directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ backup_dir }}", mode: "0750" }
        - { path: "{{ backup_dir }}/scripts", mode: "0700" }
        - { path: "{{ backup_postgres_dump_dir }}", mode: "0700" }
        - { path: "{{ backup_logs_dir }}", mode: "0750" }
        - { path: "{{ backup_rclone_config_dir }}", mode: "0700" }

    - name: Deploy rclone config from secrets when provided
      ansible.builtin.copy:
        content: "{{ backup_rclone_config }}"
        dest: "{{ backup_rclone_config_dir }}/rclone.conf"
        owner: root
        group: root
        mode: "0600"
      when:
        - backup_rclone_config is defined
        - backup_rclone_config | length > 0

    - name: Check rclone config file exists when repository uses rclone backend
      ansible.builtin.stat:
        path: "{{ backup_rclone_config_dir }}/rclone.conf"
      register: backup_rclone_config_stat
      when: backup_restic_repository is match('^rclone:')

    - name: Assert rclone config file is present for rclone backend
      ansible.builtin.assert:
        that:
          - backup_rclone_config_stat.stat.exists
        fail_msg: >-
          Missing {{ backup_rclone_config_dir }}/rclone.conf.
          Either set `backup_rclone_config` in provision/secrets.yml
          or run `rclone config` on the host before enabling backups.
      when: backup_restic_repository is match('^rclone:')

    - name: Deploy backup files
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode }}"
      loop:
        - src: backup.env.j2
          dest: "{{ backup_dir }}/scripts/backup.env"
          mode: "0600"
        - src: pre-backup-pgdump.sh.j2
          dest: "{{ backup_dir }}/scripts/pre-backup-pgdump.sh"
          mode: "0700"
        - src: restic-backup.sh.j2
          dest: "{{ backup_dir }}/scripts/restic-backup.sh"
          mode: "0700"
        - src: restic-prune.sh.j2
          dest: "{{ backup_dir }}/scripts/restic-prune.sh"
          mode: "0700"
        - src: restic-check.sh.j2
          dest: "{{ backup_dir }}/scripts/restic-check.sh"
          mode: "0700"

    - name: Deploy backup systemd units
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "/etc/systemd/system/{{ item.dest }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - { src: kiran-restic-backup.service.j2, dest: kiran-restic-backup.service }
        - { src: kiran-restic-backup.timer.j2, dest: kiran-restic-backup.timer }
        - { src: kiran-restic-prune.service.j2, dest: kiran-restic-prune.service }
        - { src: kiran-restic-prune.timer.j2, dest: kiran-restic-prune.timer }
        - { src: kiran-restic-check.service.j2, dest: kiran-restic-check.service }
        - { src: kiran-restic-check.timer.j2, dest: kiran-restic-check.timer }
      register: backup_systemd_units

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
      when: backup_systemd_units.changed

    - name: Enable and start backup timers
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - kiran-restic-backup.timer
        - kiran-restic-prune.timer
        - kiran-restic-check.timer
