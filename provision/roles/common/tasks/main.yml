---
# ── Phase 1: System update ────────────────────────────────────────────────
- name: Wait for apt/dpkg locks to be released
  ansible.builtin.shell: |
    while fuser /var/lib/apt/lists/lock >/dev/null 2>&1 || \
          fuser /var/lib/dpkg/lock >/dev/null 2>&1 || \
          fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do
      sleep 3
    done
  args:
    executable: /bin/bash
  changed_when: false

- name: Enable universe repository
  ansible.builtin.apt_repository:
    repo: "deb http://ports.ubuntu.com/ubuntu-ports {{ ansible_distribution_release }} universe"
    state: present
    update_cache: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: safe

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg2
      - lsb-release
      - ca-certificates
      - apt-transport-https
      - software-properties-common
      - iptables
      - iptables-persistent
      - netfilter-persistent
      - fail2ban
      - unattended-upgrades
      - auditd
      - audispd-plugins
      - htop
      - iotop
      - nethogs
      - apparmor
      - apparmor-utils
    state: present

# ── Phase 2: deploy user ─────────────────────────────────────────────────
- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true
    state: present

- name: Set deploy user password
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    password: "{{ deploy_password | password_hash('sha512') }}"

- name: Assert deploy SSH public key is set
  vars:
    common_deploy_ssh_public_key_value: "{{ common_deploy_ssh_public_key | default(deploy_ssh_public_key | default('')) }}"
  ansible.builtin.assert:
    that:
      - common_deploy_ssh_public_key_value | length > 0
    fail_msg: >
      common_deploy_ssh_public_key is empty. Set it in secrets.yml or pass via
      --extra-vars 'common_deploy_ssh_public_key="ssh-ed25519 AAAA..."'.

- name: Copy SSH authorized_keys to deploy user
  vars:
    common_deploy_ssh_public_key_value: "{{ common_deploy_ssh_public_key | default(deploy_ssh_public_key | default('')) }}"
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    state: present
    key: "{{ common_deploy_ssh_public_key_value }}"

# ── Phase 2b: deploy user utilities ──────────────────────────────────────
- name: Create ~/.local/bin for deploy user
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/.local/bin"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Deploy dex container exec utility
  ansible.builtin.template:
    src: dex.sh.j2
    dest: "/home/{{ deploy_user }}/.local/bin/dex"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Ensure ~/.local/bin is on PATH in .bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ deploy_user }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
    create: false

# ── Phase 3: SSH hardening ────────────────────────────────────────────────
- name: Configure sshd
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s
  notify: Reload sshd

# ── Phase 4: iptables-persistent ─────────────────────────────────────────
# UFW is NOT used on OCI Ubuntu — UFW's reset flushes OCI's VNIC routing rules
# and can break all inbound connectivity. See:
# https://medium.com/oracledevs/firewalls-with-ubuntu-on-oci-274c6a1ea670
#
# Instead: iptables-persistent writes rules.v4 and netfilter-persistent
# restores them on every boot. The OCI Security List is the outer firewall;
# this is the host-level defence-in-depth layer.

- name: Remove UFW if present (conflicts with OCI networking)
  ansible.builtin.apt:
    name: ufw
    state: absent
    purge: true

- name: Deploy iptables rules
  ansible.builtin.template:
    src: rules.v4.j2
    dest: /etc/iptables/rules.v4
    owner: root
    group: root
    mode: "0640"
  notify: Restore iptables

- name: Enable and start netfilter-persistent
  ansible.builtin.systemd:
    name: netfilter-persistent
    enabled: true
    state: started

# ── Phase 5: Fail2Ban ─────────────────────────────────────────────────────
- name: Deploy jail.local
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

# ── Phase 6: Unattended upgrades ──────────────────────────────────────────
- name: Configure unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

# ── Phase 7: sysctl hardening ─────────────────────────────────────────────
- name: Deploy sysctl hardening config
  ansible.builtin.template:
    src: 99-harden.conf.j2
    dest: /etc/sysctl.d/99-harden.conf
    owner: root
    group: root
    mode: "0644"
  notify: Apply sysctl

# ── Phase 8: /dev/shm hardening ───────────────────────────────────────────
# Note: do NOT mount on /run/shm — it is a symlink to /dev/shm and mounting
# there creates a second tmpfs overlay, which can break containers.
- name: Mount /dev/shm noexec nosuid (harden shared memory)
  ansible.posix.mount:
    path: /dev/shm
    src: tmpfs
    fstype: tmpfs
    opts: defaults,noexec,nosuid,nodev
    state: present
  # 'present' writes to fstab but does NOT remount immediately.
  # Remount is handled by the next task.

- name: Remount /dev/shm with hardened options
  ansible.posix.mount:
    path: /dev/shm
    src: tmpfs
    fstype: tmpfs
    opts: defaults,noexec,nosuid,nodev
    state: remounted

# ── Phase 9: Swap ─────────────────────────────────────────────────────────
- name: Check if swapfile exists
  ansible.builtin.stat:
    path: /swapfile
  register: swapfile_stat

- name: Create 2 GB swapfile
  ansible.builtin.command: fallocate -l 2G /swapfile
  when: not swapfile_stat.stat.exists
  changed_when: true

- name: Set swapfile permissions
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"
  when: not swapfile_stat.stat.exists

- name: Format swapfile
  ansible.builtin.command: mkswap /swapfile
  when: not swapfile_stat.stat.exists
  changed_when: true

- name: Enable swapfile
  ansible.builtin.command: swapon /swapfile
  when: not swapfile_stat.stat.exists
  changed_when: true

- name: Add swapfile to fstab
  ansible.posix.mount:
    path: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present

# ── Phase 10: Timezone, auditd, AppArmor ──────────────────────────────────
- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started

- name: Verify AppArmor is active
  ansible.builtin.command: aa-status
  register: apparmor_status
  changed_when: false
  failed_when: apparmor_status.rc != 0

- name: Check if reboot is required after package upgrades
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot if kernel or critical packages were upgraded
  ansible.builtin.reboot:
    reboot_timeout: 600
    connect_timeout: 60
    msg: "Rebooting after package upgrades (reboot-required flag set)"
  when: reboot_required.stat.exists
