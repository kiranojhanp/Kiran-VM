---
# ── Gitea role tasks ──────────────────────────────────────────────────────────
# Compose lifecycle is now managed by Komodo (git-backed stack).
# Ansible provisions directories, custom templates, and the webhook allowlist.

- name: Assert required gitea secrets are defined
  ansible.builtin.assert:
    that:
      - gitea_secret_key is defined and gitea_secret_key | length > 0
      - shared_postgres_gitea_password is defined and shared_postgres_gitea_password | length > 0
    fail_msg: "One or more required gitea secrets are missing in secrets.yml"

- name: Create gitea base directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"
  loop:
    - "{{ gitea_dir }}"

- name: Create gitea data and config directories (owned by uid 1000 for rootless)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  become: true
  loop:
    - "{{ gitea_dir }}/data"
    - "{{ gitea_dir }}/config"

- name: Create gitea custom templates directories (owned by uid 1000)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  become: true
  loop:
    - "{{ gitea_dir }}/data/custom"
    - "{{ gitea_dir }}/data/custom/templates"
    - "{{ gitea_dir }}/data/custom/templates/custom"

- name: Deploy gitea custom home template (redirect / → /explore)
  ansible.builtin.copy:
    src: custom/templates/home.tmpl
    dest: "{{ gitea_dir }}/data/custom/templates/home.tmpl"
    owner: "1000"
    group: "1000"
    mode: "0644"
  become: true

- name: Deploy gitea custom header CSS
  ansible.builtin.copy:
    src: custom/templates/custom/header.tmpl
    dest: "{{ gitea_dir }}/data/custom/templates/custom/header.tmpl"
    owner: "1000"
    group: "1000"
    mode: "0644"
  become: true

# ── Handoff: stop Ansible-managed stack so Komodo can take over ────────────
- name: Stop Ansible-managed gitea stack (hand off to Komodo)
  community.docker.docker_compose_v2:
    project_src: "{{ gitea_dir }}"
    project_name: gitea
    state: absent
    remove_orphans: true
  ignore_errors: true
  tags: [gitea, services, komodo-handoff]
