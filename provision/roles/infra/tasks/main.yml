---
# ── Infra role: shared Postgres + Redis ───────────────────────────────────────
# This role owns the shared infrastructure containers used by app stacks.
# It must run before Komodo-managed stacks are deployed.

- name: Create infra directory
  ansible.builtin.file:
    path: "{{ infra_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Deploy infra files directory
  ansible.builtin.file:
    path: "{{ infra_dir }}/files"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Deploy WAL-G Dockerfile
  ansible.builtin.template:
    src: files/Dockerfile.wal-g.j2
    dest: "{{ infra_dir }}/files/Dockerfile.wal-g"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"

- name: Deploy infra docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ infra_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"
  notify: Restart infra

- name: Deploy infra .env
  ansible.builtin.template:
    src: infra.env.j2
    dest: "{{ infra_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  notify: Restart infra

- name: Deploy Postgres init SQL (optional bootstrap SQL)
  ansible.builtin.template:
    src: init.sql.j2
    dest: "{{ infra_dir }}/init.sql"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"

- name: Build infra Postgres image with WAL-G
  ansible.builtin.shell:
    cmd: docker compose -f docker-compose.yml build --pull postgres
    chdir: "{{ infra_dir }}"
  register: pg_build
  failed_when: pg_build.rc != 0
  changed_when: true
  notify: Restart infra

- name: Start infra stack
  community.docker.docker_compose_v2:
    project_src: "{{ infra_dir }}"
    project_name: infra
    env_files:
      - "{{ infra_dir }}/.env"
    state: present
    pull: missing

- name: Wait for shared Postgres to be healthy
  community.docker.docker_container_info:
    name: "{{ postgres_container_name }}"
  register: pg_info
  until: pg_info.container.State.Health.Status == "healthy"
  retries: 20
  delay: 5

- name: Wait for shared Redis to be healthy
  community.docker.docker_container_info:
    name: "{{ redis_container_name }}"
  register: redis_info
  until: redis_info.container.State.Health.Status == "healthy"
  retries: 10
  delay: 3

# ── Shared Postgres Databases ───────────────────────────────────────────────────
- name: Create Postgres users and databases
  when: postgres_databases_list is defined and postgres_databases_list | length > 0
  block:
    - name: Create Postgres users
      ansible.builtin.shell:
        cmd: >
          docker exec {{ postgres_container_name }} psql -U postgres -c "CREATE USER {{ item }} WITH ENCRYPTED PASSWORD '{{ shared_postgres_password }}'" 2>&1 ||
            echo "User already exists, skipping"
      register: user_result
      changed_when: "'CREATE' in user_result.stdout"
      loop: "{{ postgres_databases_list }}"

    - name: Create Postgres databases
      ansible.builtin.shell:
        cmd: >
          docker exec {{ postgres_container_name }} psql -U postgres -c "CREATE DATABASE {{ item }} WITH OWNER {{ item }}" 2>&1 ||
            echo "Database already exists, skipping"
      register: db_result
      changed_when: "'CREATE DATABASE' in db_result.stdout"
      loop: "{{ postgres_databases_list }}"

    - name: Grant database ownership
      ansible.builtin.shell:
        cmd: >
          docker exec {{ postgres_container_name }} psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE {{ item }} TO {{ item }}" &&
          docker exec {{ postgres_container_name }} psql -U postgres -d {{ item }} -c "GRANT ALL ON SCHEMA public TO {{ item }}"
      loop: "{{ postgres_databases_list }}"

# ── OpenClaw directories ──────────────────────────────────────────────────────
- name: Create OpenClaw config directory
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0700"

- name: Create OpenClaw workspace directory
  ansible.builtin.file:
    path: "{{ openclaw_workspace_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0700"
