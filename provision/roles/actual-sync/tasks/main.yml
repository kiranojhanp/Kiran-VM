---
- name: Assert required Actual sync secrets are set
  ansible.builtin.assert:
    that:
      - actual_sync_id | default('') | length > 0
      - actual_password | default('') | length > 0
      - actual_sync_profiles | length > 0
    fail_msg: >-
      Actual sync is enabled but required secrets/config are missing.
      Fill provision/secrets.yml and set actual_sync_profiles in group_vars/all.yml.

- name: Create Actual sync directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ actual_sync_dir }}", mode: "0750" }
    - { path: "{{ actual_sync_data_dir }}", mode: "0700" }

- name: Pull Actual sync Docker image
  ansible.builtin.debug:
    msg: "Docker image no longer needed - using npm instead"

- name: Install fnm dependencies
  ansible.builtin.apt:
    name: unzip
    state: present

- name: Install fnm (Fast Node Manager)
  ansible.builtin.shell:
    cmd: curl -fsSL https://fnm.vercel.app/install | bash
  register: fnm_install
  changed_when: fnm_install.rc != 0

- name: Install Node.js LTS via fnm
  ansible.builtin.shell:
    cmd: bash -c "source ~/.bashrc && fnm install --lts && fnm default lts-latest"
  register: node_install
  changed_when: node_install.rc != 0

- name: Install Actual sync npm package
  ansible.builtin.shell:
    cmd: bash -c "source ~/.bashrc && fnm exec -- npm install -g @tim-smart/actualbudget-sync"
  register: npm_install
  changed_when: npm_install.rc != 0

- name: Deploy systemd service
  ansible.builtin.template:
    src: kiran-actual-sync.service.j2
    dest: "/etc/systemd/system/kiran-actual-sync.service"
    owner: root
    group: root
    mode: "0644"
  register: actual_sync_service

- name: Deploy systemd timer
  ansible.builtin.template:
    src: kiran-actual-sync.timer.j2
    dest: "/etc/systemd/system/kiran-actual-sync.timer"
    owner: root
    group: root
    mode: "0644"
  register: actual_sync_timer

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  when: actual_sync_service.changed or actual_sync_timer.changed

- name: Enable and start Actual sync timer
  ansible.builtin.systemd:
    name: kiran-actual-sync.timer
    enabled: true
    state: started
