---
- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"
  loop:
    - "{{ caddy_dir }}"
    - "{{ caddy_dir }}/data"
    - "{{ caddy_dir }}/config"

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ caddy_dir }}/Caddyfile"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  notify: Reload caddy

- name: Deploy Caddy .env
  ansible.builtin.template:
    src: caddy.env.j2
    dest: "{{ caddy_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  notify: Reload caddy

- name: Deploy Caddy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ caddy_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  notify: Reload caddy

- name: Deploy Caddy Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ caddy_dir }}/Dockerfile"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  notify: Reload caddy

- name: Start Caddy stack
  community.docker.docker_compose_v2:
    project_src: "{{ caddy_dir }}"
    project_name: caddy
    env_files:
      - "{{ caddy_dir }}/.env"
    state: present
    pull: missing
    build: always
