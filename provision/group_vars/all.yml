---
# Non-secret variables shared across all roles.
# Secrets are loaded from secrets.yml via vars_files in site.yml.

# ── Server ──────────────────────────────────────────────
deploy_user: deploy
# ssh_port is sourced from infra/constants.py in site.yml to avoid drift.
timezone: Asia/Kathmandu
# Set to false after confirming port 2222 works to close port 22.
ssh_allow_port_22: false

# ── Domain ──────────────────────────────────────────────
domain: example.com
komodo_subdomain: "komodo.{{ domain }}"
acme_email: "admin@{{ domain }}"

# ── Komodo ──────────────────────────────────────────────
komodo_port: 9120
komodo_image: "ghcr.io/moghtech/komodo-core:1.19.5"
komodo_periphery_image: "ghcr.io/moghtech/komodo-periphery:1.19.5"
komodo_log_level: info
# komodo_init_admin_username is set in secrets.yml (moved for security)
# How often Komodo polls stacks for new image versions. Must be a Komodo duration string.
komodo_resource_poll_interval: "1-hr"

# ── FerretDB (MongoDB adapter for Komodo) ───────────────
# FerretDB requires its own patched postgres image — cannot share stock postgres:16.
# The postgres-documentdb tag encodes both the PG major version and FerretDB version.
# Keep both images in sync when upgrading. Releases: https://github.com/FerretDB/FerretDB/releases
ferretdb_image: "ghcr.io/ferretdb/ferretdb:2.7.0"
ferretdb_pg_image: "ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0"

# ── WAL-G Backup ────────────────────────────────────────
# Postgres WAL archiving + base backups to R2 via WAL-G.
# WAL archival is continuous (via archive_command in Postgres container).
# Base backups run via systemd timer below.
#
# Non-secret config (secrets go in secrets.yml):
#   backup_wal_g_s3_endpoint, backup_wal_g_s3_bucket, backup_wal_g_s3_prefix
#   backup_wal_g_aws_access_key_id, backup_wal_g_aws_secret_access_key
#   backup_wal_g_password, backup_wal_g_postgres_password

wal_g_version: "3.0.1"
wal_g_delta_max_steps: 6
wal_g_max_wal_senders: 3
wal_g_wal_keep_size: "1GB"
wal_g_archive_timeout: 300

# WAL-G host-side timers (base backups, prune, integrity check)
backup_walg_backup_on_calendar: "*-*-01,15 03:00:00"
backup_walg_prune_on_calendar: "*-*-01 04:00:00"
backup_walg_check_on_calendar: "*-*-07 05:00:00"
backup_walg_retention_full: 4
backup_walg_retention_keep_weekly: 4
backup_walg_retention_keep_monthly: 6
backup_walg_retention_keep_yearly: 1

# Postgres connection for host-side WAL-G operations
# The infra_net bridge gateway IP — verify with: docker network inspect infra_net
backup_postgres_host: "172.19.0.1"
backup_postgres_port: 5432
backup_wal_g_postgres_user: wal_g

# ── Shared Infra ────────────────────────────────────────
# Shared Postgres + Redis for self-hosted app stacks.
# Note: Komodo/FerretDB uses its own separate postgres-documentdb image.
shared_docker_network: internal-network
postgres_image: "postgres:17"
redis_image: "redis:7.4.8"
infra_dir: /opt/infra
komodo_dir: /opt/komodo

# Backup (lean mode: pg_dump + restic + rclone backend)
backup_enabled: true
backup_dir: /opt/backup
backup_postgres_dump_dir: /var/backups/postgres/shared
backup_rclone_config_dir: /root/.config/rclone
backup_logs_dir: /var/log/kiran-backup
backup_shared_postgres_container: infra-postgres-1
backup_shared_postgres_user: postgres
backup_shared_postgres_databases:
  - paperless
  - vikunja
backup_restic_on_calendar: "*-*-* 02:00:00"
backup_prune_on_calendar: "Sun *-*-* 03:00:00"
backup_check_on_calendar: "*-*-01 04:00:00"
backup_retention_keep_daily: 7
backup_retention_keep_weekly: 4
backup_retention_keep_monthly: 12
backup_docker_volume_paths:
  - /var/lib/docker/volumes/actual_actual_data/_data
  - /var/lib/docker/volumes/mealie_mealie_data/_data
  - /var/lib/docker/volumes/openwebui_open_webui_data/_data
  - /var/lib/docker/volumes/vaultwarden_vaultwarden_data/_data
  - /var/lib/docker/volumes/paperless_paperless_data/_data
  - /var/lib/docker/volumes/paperless_paperless_media/_data
  - /var/lib/docker/volumes/paperless_paperless_export/_data
  - /var/lib/docker/volumes/paperless_paperless_consume/_data
  - /var/lib/docker/volumes/vikunja_vikunja_files/_data
