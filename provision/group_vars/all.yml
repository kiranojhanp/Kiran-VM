---
# Non-secret variables shared across all roles.
# Secrets are loaded from secrets.yml via vars_files in site.yml.

# ── Server ──────────────────────────────────────────────
deploy_user: deploy
# ssh_port is sourced from infra/constants.py in site.yml to avoid drift.
timezone: Asia/Kathmandu
# Set to false after confirming port 2222 works to close port 22.
ssh_allow_port_22: false

# ── Domain ──────────────────────────────────────────────
domain: fewa.app
komodo_subdomain: "komodo.{{ domain }}"

# ── Komodo ──────────────────────────────────────────────
komodo_port: 9120
komodo_image: "ghcr.io/moghtech/komodo-core:1.19.5"
komodo_periphery_image: "ghcr.io/moghtech/komodo-periphery:1.19.5"
komodo_log_level: info
# komodo_init_admin_username is set in secrets.yml (moved for security)
# How often Komodo polls stacks for new image versions. Must be a Komodo duration string.
komodo_resource_poll_interval: "1-hr"

# ── FerretDB (MongoDB adapter for Komodo) ───────────────
# FerretDB requires its own patched postgres image — cannot share stock postgres:16.
# The postgres-documentdb tag encodes both the PG major version and FerretDB version.
# Keep both images in sync when upgrading. Releases: https://github.com/FerretDB/FerretDB/releases
ferretdb_image: "ghcr.io/ferretdb/ferretdb:2.7.0"
ferretdb_pg_image: "ghcr.io/ferretdb/postgres-documentdb:17-0.107.0-ferretdb-2.7.0"

# ── Shared Infra ────────────────────────────────────────
# Shared Postgres + Redis for self-hosted app stacks.
# Note: Komodo/FerretDB uses its own separate postgres-documentdb image.
postgres_image: "postgres:17"
redis_image: "redis:7.4.8"
infra_dir: /opt/infra
komodo_dir: /opt/komodo
