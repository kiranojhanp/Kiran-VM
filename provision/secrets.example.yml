# Up tokens go in group_vars/all.yml (actual_sync_profiles)
actual_sync_id: ""
actual_password: ""

# Multiple Up users (add tokens here, reference in group_vars/all.yml)
up_user_token_1: ""  # e.g., up:live:xxx
up_user_token_2: ""  # e.g., up:live:yyy