# ── Cloudflare ──────────────────────────────────────────────────────────────
cloudflare_api_token: ""

# ── Garage S3 ───────────────────────────────────────────────────────────────
# Garage S3-compatible object storage
garage_rpc_secret: ""      # Generate with: openssl rand -hex 32
garage_admin_token: ""     # Generate with: openssl rand -hex 32
garage_metrics_token: ""   # Generate with: openssl rand -hex 32
# Garage WebUI auth — generate with: htpasswd -nbBC 10 "user" "pass"
garage_webui_auth: ""
# Shared S3 credentials for Litestream backups (used by Vaultwarden, Actual Budget, etc.)
garage_access_key_id: ""
garage_secret_access_key: ""

# ── Postgres (Additional) ─────────────────────────────────────────────────
postgres_paperless_password: ""

# ── Paperless-ngx ────────────────────────────────────────────────────────
# Django secret key — generate with: openssl rand -hex 32
paperless_secret_key: ""

# ── WAL-G Backup (Postgres) ────────────────────────────────────────────────
# R2 / S3 credentials
backup_wal_g_aws_endpoint: ""
backup_wal_g_s3_force_path_style: ""
backup_wal_g_s3_bucket: ""
backup_wal_g_s3_prefix: ""
backup_wal_g_aws_access_key_id: ""
backup_wal_g_aws_secret_access_key: ""
backup_wal_g_aws_region: ""

# WAL-G encryption password
