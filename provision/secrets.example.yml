# ── Shared Infra (Postgres + Redis) ────────────────────────────────────────
shared_postgres_password: ""
redis_password: ""

# ── Komodo ─────────────────────────────────────────────────────────────────
ferretdb_postgres_password: ""
komodo_password: ""
komodo_webhook_secret: ""
komodo_jwt_secret: ""
# Core PKI public key — get from Komodo UI: Settings → Core Public Key (starts with MCow...).
