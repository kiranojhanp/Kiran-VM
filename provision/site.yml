---
# Production server provisioning playbook
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini site.yml --extra-vars "@secrets.yml"
#
# Secrets are loaded automatically from secrets.yml (vault-encrypted).
# Vault password is read from ~/.vault_pass via ansible.cfg.

- name: Provision server
  hosts: all
  become: true
  gather_facts: true
  vars:
    # Pull shared SSH port from infra/constants.py so Pulumi + Ansible stay in sync.
    ssh_port: "{{ lookup('pipe', 'python3 ' ~ playbook_dir ~ '/scripts/infra_constant.py SSH_PORT_HARDENED') | int }}"
  vars_files:
    - secrets.yml

  roles:
    - role: common
      tags: [common, hardening]

    - role: docker
      tags: [docker]

    - role: infra
      tags: [infra, services]

    - role: komodo
      tags: [komodo, services]

    - role: backup
      tags: [backup, services]

    - role: traefik
      tags: [traefik, services]

    - role: garage
      tags: [garage, services]

    - role: litestream
      tags: [litestream, backup, services]

    - role: litestream-backup
      tags: [vaultwarden-backup, backup, services]
      vars:
        litestream_backup_enabled: true
        litestream_backup_service_name: vaultwarden
        litestream_backup_data_volume: vaultwarden_vaultwarden_data
        litestream_backup_data_path: /var/lib/docker/volumes/vaultwarden_vaultwarden_data/_data
        litestream_backup_pattern: "*.sqlite"
        litestream_backup_bucket: vaultwarden-backups

    - role: litestream-backup
      tags: [actual-backup, backup, services]
      vars:
        litestream_backup_enabled: true
        litestream_backup_service_name: actual
        litestream_backup_data_volume: actual_actual_data
        litestream_backup_data_path: /var/lib/docker/volumes/actual_actual_data/_data
        litestream_backup_pattern: "*.sqlite"
        litestream_backup_bucket: actual-backups

    - role: litestream-backup
      tags: [wallos-backup, backup, services]
      vars:
        litestream_backup_enabled: true
        litestream_backup_service_name: wallos
        litestream_backup_data_volume: wallos_wallos_db
        litestream_backup_data_path: /var/lib/docker/volumes/wallos_wallos_db/_data
        litestream_backup_pattern: "wallos.db"
        litestream_backup_bucket: wallos-backups

    - role: litestream-backup
      tags: [wealthfolio-backup, backup, services]
      vars:
        litestream_backup_enabled: true
        litestream_backup_service_name: wealthfolio
        litestream_backup_data_volume: wealthfolio_wealthfolio_data
        litestream_backup_data_path: /var/lib/docker/volumes/wealthfolio_wealthfolio_data/_data
        litestream_backup_pattern: "wealthfolio.db"
        litestream_backup_bucket: wealthfolio-backups

    - role: actual-sync
      tags: [actual-sync, services]
      vars:
        actual_sync_enabled: true
