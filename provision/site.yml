---
# Production server provisioning playbook
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini site.yml --extra-vars "@secrets.yml"
#
# Secrets are loaded automatically from secrets.yml (vault-encrypted).
# Vault password is read from ~/.vault_pass via ansible.cfg.

- name: Provision server
  hosts: all
  become: true
  gather_facts: true
  vars:
    # Pull shared SSH port from infra/constants.py so Pulumi + Ansible stay in sync.
    ssh_port: "{{ lookup('pipe', 'python3 ' ~ playbook_dir ~ '/scripts/infra_constant.py SSH_PORT_HARDENED') | int }}"
  vars_files:
    - secrets.yml

  roles:
    - role: common
      tags: [common, hardening]

    - role: docker
      tags: [docker]

    - role: infra
      tags: [infra, services]

    - role: komodo
      tags: [komodo, services]

    - role: backup
      tags: [backup, services]

    - role: traefik
      tags: [traefik, services]

    - role: garage
      tags: [garage, services]

    - role: vaultwarden-litestream
      tags: [vaultwarden-litestream, backup, services]
