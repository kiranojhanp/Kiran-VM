version: '3'

vars:
  INVENTORY_FILE: provision/inventory/hosts.ini
  ANSIBLE_ALL: ansible -i {{.INVENTORY_FILE}} all
  ANSIBLE_ALL_BECOME: ansible -i {{.INVENTORY_FILE}} all -b

tasks:
  # ---------------------------------------------------------------------------
  # Server lifecycle
  # ---------------------------------------------------------------------------
  doctor:
    desc: Preflight checks before push/update
    deps: [_select:stack, _check:provision]
    dir: '{{.INFRA_DIR}}'
    preconditions:
      - sh: command -v openssl >/dev/null 2>&1
        msg: openssl is required
      - sh: '{{.CLOUDFLARE_TOKEN_CHECK}}'
        msg: Cloudflare token not found in provision/secrets.yml (cloudflare_api_token)
      - sh: test -f ../provision/secrets.yml
        msg: provision/secrets.yml is required
      - sh: test -f "{{.VAULT_PASSWORD_FILE}}"
        msg: vault password file not found (set ANSIBLE_VAULT_PASSWORD_FILE or create ~/.vault_pass)
      - sh: pulumi config get oci:tenancyOcid >/dev/null
        msg: missing Pulumi config key oci:tenancyOcid for selected stack
      - sh: pulumi config get oci:userOcid >/dev/null
        msg: missing Pulumi config key oci:userOcid for selected stack
      - sh: pulumi config get oci:fingerprint >/dev/null
        msg: missing Pulumi config key oci:fingerprint for selected stack
      - sh: pulumi config get oci:privateKeyPath >/dev/null
        msg: missing Pulumi config key oci:privateKeyPath for selected stack
      - sh: pulumi config get oci:region >/dev/null
        msg: missing Pulumi config key oci:region for selected stack
      - sh: pulumi config get kiran-vm-infra:sshPublicKey >/dev/null
        msg: missing Pulumi config key kiran-vm-infra:sshPublicKey for selected stack
    cmds:
      - "true"

  push:
    desc: Full deploy (infra + bootstrap + provision + verify)
    deps: [_check:provision]
    cmds:
      - task doctor
      - task prepare
      - task infra:ssh22:open
      - task up
      - task provision:bootstrap
      - task update
      - task infra:ssh22:close

  update:
    desc: Re-apply provisioning and verify
    deps: [_check:provision]
    cmds:
      - task doctor
      - task provision
      - task verify

  provision:inventory:
    desc: Generate provision inventory from Pulumi output
    deps: [_select:stack]
    cmds:
      - ./provision/inventory/generate.sh

  provision:bootstrap:
    desc: First-run SSH hardening bootstrap
    deps: [_select:stack, _check:provision]
    cmds:
      - ./provision/bootstrap.sh

  provision:
    desc: Run full server provisioning
    deps: [_check:provision, provision:inventory]
    preconditions:
      - sh: test -f provision/secrets.yml
        msg: provision/secrets.yml is required
      - sh: test -f "{{.VAULT_PASSWORD_FILE}}"
        msg: vault password file not found (set ANSIBLE_VAULT_PASSWORD_FILE or create ~/.vault_pass)
    cmds:
      - ansible-playbook -i {{.INVENTORY_FILE}} provision/site.yml --vault-password-file "{{.VAULT_PASSWORD_FILE}}" --extra-vars "@provision/secrets.yml" --extra-vars "{{.PROVISION_EXTRA_VARS}}"

  verify:
    desc: Verify SSH, containers, and ingress endpoints
    deps: [_check:provision, provision:inventory]
    preconditions:
      - sh: command -v curl >/dev/null 2>&1
        msg: curl is required
      - sh: command -v openssl >/dev/null 2>&1
        msg: openssl is required
    cmds:
      - '{{.ANSIBLE_ALL}} -m ping'
      - '{{.ANSIBLE_ALL}} -m shell -a "set -e; sudo -n docker ps >/dev/null; test -z \"\$(sudo -n docker ps -a --filter health=unhealthy -q)\""'
      - '{{.ANSIBLE_ALL_BECOME}} -m script -a provision/scripts/check_unique_traefik_hosts.py'
      - >-
        {{.ANSIBLE_ALL}} -m shell -a
        "set -e; base=/opt/traefik; test -f \"\$base/compose.yaml\"; test -f \"\$base/traefik.yml\"; sudo -n docker compose -f \"\$base/compose.yaml\" config >/dev/null"
      - >-
        {{.ANSIBLE_ALL}} -m shell -a
        "set -e; sudo -n docker ps --filter label=com.docker.compose.project=traefik --filter label=com.docker.compose.service=traefik --filter status=running --quiet | grep -q ."
      - curl --fail --silent --show-error --location --max-redirs 3 "{{.KOMODO_HTTP_URL}}" >/dev/null
      - curl --fail --silent --show-error "{{.KOMODO_URL}}" >/dev/null
      - >-
        openssl s_client -connect {{.KOMODO_SUBDOMAIN_LABEL}}.{{.DOMAIN_NAME_DEFAULT}}:443
        -servername {{.KOMODO_SUBDOMAIN_LABEL}}.{{.DOMAIN_NAME_DEFAULT}} < /dev/null 2>/dev/null
        | openssl x509 -noout -issuer -subject >/dev/null

  # ---------------------------------------------------------------------------
  # Streaming backups (WAL-G for Postgres, Litestream for SQLite)
  # ---------------------------------------------------------------------------
  backup:health:
    desc: Run both Postgres and SQLite backup health checks
    deps: [_check:provision, provision:inventory]
    cmds:
      - task backup:postgres:health
      - task backup:sqlite:health

  backup:postgres:list:
    aliases: [backup:walg:list, walg:backup:list]
    desc: List WAL-G backups in R2
    deps: [_check:provision, provision:inventory]
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; docker exec infra-postgres-1 wal-g backup-list"

  backup:postgres:run:
    aliases: [backup:walg:run, walg:backup:run]
    desc: Run WAL-G base backup immediately
    deps: [_check:provision, provision:inventory]
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; sudo /opt/backup/scripts/wal-g-backup.sh"

  backup:postgres:restore:
    aliases: [backup:walg:restore, walg:backup:restore]
    desc: Restore latest WAL-G backup to /tmp/wal-g-restore
    deps: [_check:provision, provision:inventory]
    vars:
      TARGET_DIR: '/tmp/wal-g-restore'
      BACKUP_NAME: 'LATEST'
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; sudo /opt/backup/scripts/wal-g-restore.sh --target-dir {{.TARGET_DIR}} --backup {{.BACKUP_NAME}}"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; docker cp infra-postgres-1:{{.TARGET_DIR}}/. /tmp/walg-restore/"
      - echo "Restored to /tmp/walg-restore on server"

  backup:postgres:restore:pitr:
    aliases: [backup:walg:restore:pitr, walg:backup:restore:pitr]
    desc: Point-in-time restore (set PITR_TIMESTAMP, e.g. '2025-01-15 14:30:00')
    deps: [_check:provision, provision:inventory]
    requires:
      vars: [PITR_TIMESTAMP, TARGET_DIR]
    vars:
      TARGET_DIR: '/tmp/wal-g-restore-pitr'
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; sudo /opt/backup/scripts/wal-g-restore.sh --target-dir {{.TARGET_DIR}} --pitr '{{.PITR_TIMESTAMP}}'"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; docker cp infra-postgres-1:{{.TARGET_DIR}}/. /tmp/walg-restore-pitr/"
      - echo "PITR restored to /tmp/walg-restore-pitr on server"

  backup:postgres:check:
    aliases: [backup:walg:check, walg:check]
    desc: Run WAL-G backup integrity check
    deps: [_check:provision, provision:inventory]
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; sudo /opt/backup/scripts/wal-g-check.sh"

  backup:postgres:health:
    aliases: [backup:walg:health, walg:health]
    desc: Verify WAL-G timers, R2 connectivity, and latest backup age
    deps: [_check:provision, provision:inventory]
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; systemctl list-timers --all | grep walg"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; docker exec infra-postgres-1 wal-g backup-list --json 2>/dev/null | python3 -c 'import sys,json; backups=json.load(sys.stdin); latest=backups[0] if backups else None; print(f\"Latest backup: {latest[\\\"backup_name\\\"]} at {latest[\\\"modified\\\"]}\" if latest else \"No backups\")'"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; docker exec infra-postgres-1 wal-g backup-check"

  # ── Actual Budget Sync ───────────────────────────────────────────────────────
  actual-sync:run:
    desc: Manually trigger Actual Budget sync
    deps: [_check:provision, provision:inventory]
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m systemd -a
        "name=kiran-actual-sync.service state=started daemon_reload=true"

  # ---------------------------------------------------------------------------
  # SQLite streaming backups (Litestream)
  # Usage: task backup:sqlite:status SERVICE=vaultwarden
  # ---------------------------------------------------------------------------
  backup:sqlite:status:
    aliases: [backup:litestream:status, litestream:status]
    desc: Check Litestream service and timer status
    deps: [_check:provision, provision:inventory]
    requires:
      vars: [SERVICE]
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; systemctl status kiran-{{.SERVICE}}-litestream.service --no-pager"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; systemctl list-timers --all | grep {{.SERVICE}}-litestream"

  backup:sqlite:versions:
    aliases: [backup:litestream:versions, litestream:versions]
    desc: Show Garage object stats for SQLite backup bucket
    deps: [_check:provision, provision:inventory]
    requires:
      vars: [SERVICE]
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; docker exec garage /garage bucket info {{.SERVICE}}-backups"

  backup:sqlite:restore:
    aliases: [backup:litestream:restore, litestream:restore]
    desc: Restore latest Litestream snapshot to target directory
    deps: [_check:provision, provision:inventory]
    requires:
      vars: [SERVICE, TARGET_DIR]
    vars:
      TARGET_DIR: '/tmp/litestream-restore'
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; mkdir -p {{.TARGET_DIR}}"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; LITESTREAM_ACCESS_KEY_ID={{.garage_access_key_id}} LITESTREAM_SECRET_ACCESS_KEY={{.garage_secret_access_key}} /usr/bin/litestream restore -o {{.TARGET_DIR}}/db.sqlite3 s3://{{.SERVICE}}-backups/prod/db"
      - echo "Restored to {{.TARGET_DIR}}/db.sqlite3 on server"

  backup:sqlite:restore:pitr:
    aliases: [backup:litestream:restore:pitr, litestream:restore:pitr]
    desc: Restore Litestream to specific point in time
    deps: [_check:provision, provision:inventory]
    requires:
      vars: [SERVICE, PITR_TIMESTAMP, TARGET_DIR]
    vars:
      TARGET_DIR: '/tmp/litestream-restore-pitr'
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; mkdir -p {{.TARGET_DIR}}"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; LITESTREAM_ACCESS_KEY_ID={{.garage_access_key_id}} LITESTREAM_SECRET_ACCESS_KEY={{.garage_secret_access_key}} /usr/bin/litestream restore -t '{{.PITR_TIMESTAMP}}' -o {{.TARGET_DIR}}/db.sqlite3 s3://{{.SERVICE}}-backups/prod/db"
      - echo "Point-in-time restore to {{.TARGET_DIR}}/db.sqlite3 on server"

  backup:sqlite:health:
    aliases: [backup:litestream:health, litestream:health]
    desc: Verify Litestream services, timers, and Garage connectivity
    deps: [_check:provision, provision:inventory]
    cmds:
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; systemctl status kiran-vaultwarden-litestream.service kiran-actual-litestream.service kiran-wallos-litestream.service kiran-wealthfolio-litestream.service --no-pager"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; systemctl list-timers --all | grep -E 'vaultwarden-litestream|actual-litestream|wallos-litestream|wealthfolio-litestream'"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; journalctl -u kiran-vaultwarden-litestream.service -n 10 --no-pager"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; journalctl -u kiran-actual-litestream.service -n 10 --no-pager"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; journalctl -u kiran-wallos-litestream.service -n 10 --no-pager"
      - >-
        {{.ANSIBLE_ALL_BECOME}} -m shell -a
        "set -e; journalctl -u kiran-wealthfolio-litestream.service -n 10 --no-pager"
