version: '3'

vars:
  # Stack targeting
  INFRA_DIR: infra
  STACK_NAME: '{{default "kiran-self-hosting" .STACK}}'
  BASE_STACK: '{{default "kiran-self-hosting" .BASE_STACK}}'

  # Reusable command fragments (keep infra tasks DRY)
  STACK_ENSURE_CMD: 'pulumi stack select {{.STACK_NAME}} || pulumi stack init {{.STACK_NAME}} --copy-config-from {{.BASE_STACK}} || pulumi stack init {{.STACK_NAME}}'
  CLOUDFLARE_TOKEN_CHECK: 'test -n "${CLOUDFLARE_API_TOKEN:-}" || test -f "${CLOUDFLARE_API_TOKEN_FILE:-$HOME/.cloudflare_pass}"'
  CLOUDFLARE_TOKEN_EXPORT: 'CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN:-$(cat "${CLOUDFLARE_API_TOKEN_FILE:-$HOME/.cloudflare_pass}")}"'

  # Naming / domain defaults
  PROJECT_NAME_DEFAULT: kiran-self-hosting
  DOMAIN_NAME_DEFAULT: fewa.app
  ACME_EMAIL_DEFAULT: admin@fewa.app
  KOMODO_SUBDOMAIN_LABEL: komodo
  DNS_SUBDOMAIN_LABELS: backup,git,komodo,n8n,sure
  CLOUDFLARE_ZONE_ID_DEFAULT: 58dce5945a8941e4c38a3611af123052

  # OCI naming suffixes
  SUFFIX_COMPARTMENT: -compartment
  SUFFIX_VCN: -vcn
  SUFFIX_IGW: -igw
  SUFFIX_RT: -rt
  SUFFIX_SL: -sl
  SUFFIX_SUBNET: -subnet
  SUFFIX_VM: -vm
  SUFFIX_VNIC: -vnic

  # Networking
  ANYWHERE: 0.0.0.0/0
  VCN_CIDR: 10.0.0.0/16
  SUBNET_CIDR: 10.0.0.0/24
  SUBNET_DNS_LABEL: public
  PORT_HTTP: 80
  PORT_HTTPS: 443
  SSH_PORT_INITIAL: 22
  SSH_PORT_HARDENED: 2222
  SHARED_DOCKER_NETWORK: internal-network

  # OCI protocol constants
  PROTO_TCP: '6'
  PROTO_ICMP: '1'
  ICMP_TYPE_PATH_MTU: 3
  ICMP_CODE_PATH_MTU: 4
  ICMP_TYPE_PING: 8

  # Compute defaults
  INSTANCE_SHAPE: VM.Standard.A1.Flex
  INSTANCE_OCPUS: 4
  INSTANCE_MEM_GB: 24
  IMAGE_OS: Canonical Ubuntu
  IMAGE_OS_VERSION: '22.04'
  BOOT_VOLUME_GB_DEFAULT: '200'
  AD_INDEX_DEFAULT: '0'

  # Provision/verify helpers
  KOMODO_URL: 'https://{{.KOMODO_SUBDOMAIN_LABEL}}.{{.DOMAIN_NAME_DEFAULT}}'
  KOMODO_HTTP_URL: 'http://{{.KOMODO_SUBDOMAIN_LABEL}}.{{.DOMAIN_NAME_DEFAULT}}'
  PROVISION_EXTRA_VARS: 'shared_docker_network={{.SHARED_DOCKER_NETWORK}} domain={{.DOMAIN_NAME_DEFAULT}} komodo_subdomain={{.KOMODO_SUBDOMAIN_LABEL}}.{{.DOMAIN_NAME_DEFAULT}} acme_email={{.ACME_EMAIL_DEFAULT}}'
  DESTROY_RETRIES: '{{default "10" .DESTROY_RETRIES}}'
  DESTROY_WAIT_SECONDS: '{{default "30" .DESTROY_WAIT_SECONDS}}'

includes:
  core:
    taskfile: ./taskfiles/core.yml
    flatten: true
  infra:
    taskfile: ./taskfiles/infra.yml
    flatten: true
  server:
    taskfile: ./taskfiles/server.yml
    flatten: true
  integrations:
    taskfile: ./taskfiles/integrations.yml
    flatten: true
