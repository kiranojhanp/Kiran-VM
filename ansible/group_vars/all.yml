---
# Non-secret variables shared across all roles.
# Secrets (passwords, tokens) are passed via --extra-vars from Pulumi
# or manually via: ansible-playbook site.yml --extra-vars "@secrets.yml"

# ── Server ──────────────────────────────────────────────
deploy_user: deploy
ssh_port: 2222
timezone: UTC
# Set to false after confirming port 2222 works to close port 22.
ssh_allow_port_22: true

# ── Domain ──────────────────────────────────────────────
domain: fewa.app
komodo_subdomain: "komodo.{{ domain }}"

# ── Komodo ──────────────────────────────────────────────
komodo_port: 9120
komodo_image: "ghcr.io/moghtech/komodo-core:latest"
komodo_periphery_image: "ghcr.io/moghtech/komodo-periphery:latest"
komodo_log_level: info
komodo_init_admin_username: fewaadmin

# ── FerretDB (MongoDB adapter for Komodo) ───────────────
# FerretDB requires its own patched postgres image — cannot share stock postgres:16.
ferretdb_image: "ghcr.io/ferretdb/ferretdb:latest"
ferretdb_pg_image: "ghcr.io/ferretdb/postgres-documentdb:latest"

# ── Caddy ───────────────────────────────────────────────
# caddy_image is intentionally omitted: the Caddy service uses a build: directive
# in docker-compose.yml.j2 to build a custom image via xcaddy (adds Cloudflare DNS
# module) from a Dockerfile deployed to {{ caddy_dir }}/Dockerfile. This replaces
# the unofficial slothcroissant/caddy-cloudflaredns:latest image.
caddy_email: "admin@{{ domain }}"

# ── Paths ───────────────────────────────────────────────
infra_dir: /opt/infra
komodo_dir: /opt/komodo
caddy_dir: /opt/caddy
sure_dir: /opt/sure
postiz_dir: /opt/postiz

# ── Sure ────────────────────────────────────────────────
sure_subdomain: "sure.{{ domain }}"
sure_port: 3000

# ── Postiz ──────────────────────────────────────────────
postiz_subdomain: "postiz.{{ domain }}"
postiz_port: 4007
