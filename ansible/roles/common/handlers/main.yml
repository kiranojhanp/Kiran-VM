---
- name: Reload sshd
  ansible.builtin.systemd:
    name: sshd
    state: reloaded

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restore iptables
  ansible.builtin.command: iptables-restore /etc/iptables/rules.v4
  changed_when: true
