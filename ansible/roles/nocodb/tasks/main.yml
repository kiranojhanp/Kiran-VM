---
# ── NocoDB role tasks ─────────────────────────────────────────────────────────
# Compose lifecycle is now managed by Komodo (git-backed stack).
# Ansible only provisions the required directories.

- name: Create nocodb directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"
  loop:
    - "{{ nocodb_dir }}"
    - "{{ nocodb_dir }}/data"

# ── Handoff: stop Ansible-managed stack so Komodo can take over ────────────
- name: Stop Ansible-managed nocodb stack (hand off to Komodo)
  community.docker.docker_compose_v2:
    project_src: "{{ nocodb_dir }}"
    project_name: nocodb
    state: absent
    remove_orphans: true
  ignore_errors: true
  tags: [nocodb, services, komodo-handoff]
