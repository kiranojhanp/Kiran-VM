---
- name: Assert required gitea secrets are defined
  ansible.builtin.assert:
    that:
      - gitea_secret_key is defined and gitea_secret_key | length > 0
      - shared_postgres_gitea_password is defined and shared_postgres_gitea_password | length > 0
    fail_msg: "One or more required gitea secrets are missing in secrets.yml"

- name: Create gitea directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"
  loop:
    - "{{ gitea_dir }}"

- name: Create gitea data and config directories (owned by uid 1000 for rootless)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  become: true
  loop:
    - "{{ gitea_dir }}/data"
    - "{{ gitea_dir }}/config"

- name: Deploy gitea .env
  ansible.builtin.template:
    src: gitea.env.j2
    dest: "{{ gitea_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  notify: Restart gitea

- name: Deploy gitea docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ gitea_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  notify: Restart gitea

- name: Start gitea stack
  community.docker.docker_compose_v2:
    project_src: "{{ gitea_dir }}"
    project_name: gitea
    env_files:
      - .env
    state: present
    pull: missing
