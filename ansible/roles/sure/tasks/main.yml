---
# ── Sure role tasks ──────────────────────────────────────────────────────────
# Compose lifecycle is now managed by Komodo (git-backed stack).
# Ansible only provisions the directory and cleans up old volumes.

- name: Create Sure directory
  ansible.builtin.file:
    path: "{{ sure_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"

# ── Handoff: stop Ansible-managed stack so Komodo can take over ────────────
- name: Stop Ansible-managed Sure stack (hand off to Komodo)
  community.docker.docker_compose_v2:
    project_src: "{{ sure_dir }}"
    project_name: sure
    state: absent
    remove_orphans: true
  ignore_errors: true
  tags: [sure, services, komodo-handoff]

- name: Remove old Sure postgres and redis volumes
  community.docker.docker_volume:
    name: "{{ item }}"
    state: absent
  loop:
    - sure_postgres-data
    - sure_redis-data
  ignore_errors: true
