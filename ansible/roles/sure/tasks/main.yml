---
# ── Sure role tasks ──────────────────────────────────────────────────────────

- name: Create Sure directory
  ansible.builtin.file:
    path: "{{ sure_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"

- name: Deploy Sure .env
  ansible.builtin.template:
    src: sure.env.j2
    dest: "{{ sure_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  notify: Restart sure

- name: Deploy Sure docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ sure_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0640"
  notify: Restart sure

- name: Pull Sure images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ sure_dir }}"
    project_name: sure

- name: Start Sure stack
  community.docker.docker_compose_v2:
    project_src: "{{ sure_dir }}"
    project_name: sure
    env_files:
      - "{{ sure_dir }}/.env"
    state: present
    pull: missing
    remove_orphans: true

- name: Remove old Sure postgres and redis volumes
  community.docker.docker_volume:
    name: "{{ item }}"
    state: absent
  loop:
    - sure_postgres-data
    - sure_redis-data
  ignore_errors: true
