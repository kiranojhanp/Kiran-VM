---
# Compose lifecycle managed by Komodo.
# Ansible pre-creates data dir and writes secrets to .env file.
- name: Create Open WebUI data directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  become: true
  loop:
    - "{{ openwebui_dir }}"
    - "{{ openwebui_dir }}/data"

- name: Write Open WebUI .env file
  ansible.builtin.template:
    src: openwebui.env.j2
    dest: "{{ openwebui_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  become: true
