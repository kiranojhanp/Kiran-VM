---
# Compose lifecycle managed by Komodo.
# Ansible pre-creates data dir and writes secrets to the Komodo stack .env file,
# which Docker Compose automatically picks up for ${VAR} substitution.
- name: Create Open WebUI data directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  become: true
  loop:
    - "{{ openwebui_dir }}"
    - "{{ openwebui_dir }}/data"

- name: Ensure Komodo stack directory exists
  ansible.builtin.file:
    path: /opt/komodo/periphery/repos/kiran-vm/stacks/openwebui
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Write openwebui .env to Komodo stack working directory
  ansible.builtin.template:
    src: openwebui.env.j2
    dest: /opt/komodo/periphery/repos/kiran-vm/stacks/openwebui/.env
    owner: root
    group: root
    mode: "0600"
  become: true
