---
# Compose lifecycle managed by Komodo.
# Secrets are set in the Komodo Stack Environment tab (same pattern as all other stacks).
- name: Create Open WebUI data directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0750"
  become: true
  loop:
    - "{{ openwebui_dir }}"
    - "{{ openwebui_dir }}/data"
