---
- name: Assert komodo secrets are set
  ansible.builtin.assert:
    that:
      - komodo_passkey is defined
      - komodo_passkey | length > 0
      - komodo_webhook_secret is defined
      - komodo_webhook_secret | length > 0
    fail_msg: "komodo_passkey and komodo_webhook_secret must be set in secrets.yml (use: openssl rand -hex 32)"

- name: Create Komodo directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"
  loop:
    - "{{ komodo_dir }}"
    - "{{ komodo_dir }}/mongodb"
    - "{{ komodo_dir }}/data"

- name: Deploy Komodo .env
  ansible.builtin.template:
    src: komodo.env.j2
    dest: "{{ komodo_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  notify: Restart komodo

- name: Deploy Komodo docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ komodo_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  notify: Restart komodo

- name: Start Komodo stack
  community.docker.docker_compose_v2:
    project_src: "{{ komodo_dir }}"
    project_name: komodo
    env_files:
      - "{{ komodo_dir }}/.env"
    state: present
    pull: missing

# Note: port {{ komodo_port }} is blocked at the host firewall level by the
# common role (iptables rules.v4) and at the OCI Security List level (Pulumi).
# No per-role firewall rule needed here.
