---
- name: Assert required komodo secrets are defined
  ansible.builtin.assert:
    that:
      - komodo_passkey is defined and komodo_passkey | length > 0
      - komodo_webhook_secret is defined and komodo_webhook_secret | length > 0
      - komodo_password is defined and komodo_password | length > 0
      - ferretdb_postgres_password is defined and ferretdb_postgres_password | length > 0
      - komodo_jwt_secret is defined and komodo_jwt_secret | length > 0
    fail_msg: "One or more required komodo secrets are missing in secrets.yml"

- name: Create komodo directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0750"
  loop:
    - "{{ komodo_dir }}"
    - "{{ komodo_dir }}/data"
    - "{{ komodo_dir }}/periphery"

- name: Deploy komodo .env
  ansible.builtin.template:
    src: komodo.env.j2
    dest: "{{ komodo_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  notify: Restart komodo

- name: Deploy komodo docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ komodo_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
  notify: Restart komodo

- name: Start komodo stack
  community.docker.docker_compose_v2:
    project_src: "{{ komodo_dir }}"
    project_name: komodo
    env_files:
      - .env
    state: present
    pull: missing
