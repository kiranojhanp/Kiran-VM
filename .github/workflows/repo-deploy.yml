name: Repo Deploy

on:
  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: repo-deploy
  cancel-in-progress: false

jobs:
  trigger-deploy:
    name: Trigger Komodo repo pull
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate webhook secrets
        run: |
          test -n "${{ secrets.KOMODO_REPO_WEBHOOK_URL }}"
          test -n "${{ secrets.KOMODO_REPO_WEBHOOK_SECRET }}"

      - name: Trigger Komodo repo pull
        run: |
          payload='{"event":"${{ github.event_name }}","repository":"${{ github.repository }}","commit":"${{ github.sha }}","ref":"${{ github.ref_name }}","workflow":"${{ github.workflow }}"}';
          sig=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "${{ secrets.KOMODO_REPO_WEBHOOK_SECRET }}" -hex | sed 's/^.* //');
          curl --fail --silent --show-error \
            --retry 3 --retry-delay 2 \
            --connect-timeout 10 --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: ${{ github.event_name }}" \
            -H "X-Hub-Signature-256: sha256=$sig" \
            -d "$payload" \
            "${{ secrets.KOMODO_REPO_WEBHOOK_URL }}"

      - name: Report success
        run: echo "Komodo notified for repo pull at ${{ github.ref_name }}"
