name: Deploy stacks on change

on:
  push:
    branches: [main]
    paths:
      - "stacks/**"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sure:
              - "stacks/sure/**"
            nocodb:
              - "stacks/nocodb/**"
            databasus:
              - "stacks/databasus/**"
            gitea:
              - "stacks/gitea/**"
            n8n:
              - "stacks/n8n/**"

  deploy:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        stack: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - name: Deploy ${{ matrix.stack }}
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ secrets[format('KOMODO_WEBHOOK_{0}', upper(matrix.stack))] }}
          webhook_secret: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
