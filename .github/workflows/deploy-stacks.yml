name: Deploy caddy stack on change

# Triggered on pushes to main that touch stacks/caddy/**.

on:
  push:
    branches: [main]
    paths:
      - "stacks/caddy/**"

# ── Jobs ──────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Deploy caddy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup go-task
        uses: pnorton5432/setup-task@v1
        with:
          task-version: 3.29.1
      - name: Trigger Komodo procedure
        run: task komodo:trigger STACK="caddy" WEBHOOK_URL="${{ secrets.KOMODO_WEBHOOK_CADDY }}" WEBHOOK_SECRET="${{ secrets.KOMODO_WEBHOOK_SECRET }}"
